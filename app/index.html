<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toy Game Generator</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="/app/styles.css">
</head>
<body>
<main class="shell">
  <section class="panel control-panel" aria-label="Generator controls">
    <div class="brand">
      <h1>Toy Game Generator</h1>
      <p data-i18n="tagline">一句话生成可玩的 HTML 小游戏</p>
    </div>
    <label class="field language-field">
      <span data-i18n="language">语言</span>
      <select data-role="language-select" name="language">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </label>

    <form data-role="generate-form" class="form">
      <label class="field">
        <span data-i18n="theme">主题</span>
        <textarea data-role="theme-input" name="theme" rows="3" autocomplete="off">算命游戏</textarea>
      </label>

      <div class="grid">
        <label class="field">
          <span data-i18n="difficulty">难度</span>
          <select data-role="difficulty-select" name="difficulty">
            <option value="" data-i18n="auto">自动</option>
            <option value="mellow" data-i18n="mellow">轻松</option>
            <option value="standard" data-i18n="standard">标准</option>
            <option value="espresso" data-i18n="espresso">高压</option>
          </select>
        </label>
        <label class="field">
          <span data-i18n="output">输出</span>
          <select data-role="count-select" name="count">
            <option value="1" data-i18n="oneGame">一个游戏</option>
            <option value="3" data-i18n="threeCandidates">三个候选</option>
          </select>
        </label>
      </div>

      <label class="toggle">
        <input data-role="ai-toggle" type="checkbox" name="ai">
        <span data-i18n="deepseek">DeepSeek GameSpec</span>
      </label>

      <div class="actions">
        <button data-role="list-button" type="button" data-i18n="rank">排序</button>
        <button data-role="generate-button" type="submit" data-i18n="generate">生成</button>
      </div>
    </form>

    <section class="panel-inner" aria-label="Candidates">
      <h2 data-i18n="candidates">候选</h2>
      <ol data-role="candidate-list" class="candidates"></ol>
    </section>
  </section>

  <section class="workspace" aria-label="Generated game">
    <header class="toolbar">
      <div>
        <strong data-role="status-title" data-i18n="ready">就绪</strong>
        <span data-role="status-detail" data-i18n="noGame">还没有生成游戏</span>
      </div>
      <div class="links">
        <a data-role="download-html" download hidden>HTML</a>
        <a data-role="download-spec" download hidden>Spec</a>
      </div>
    </header>
    <iframe data-role="game-preview" title="Generated game preview"></iframe>
  </section>
</main>
<script src="/app/app.js"></script>
</body>
</html>
