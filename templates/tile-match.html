<!doctype html>
<html lang="{{LANG}}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>{{TITLE}}</title><link rel="icon" href="data:,"><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:{{BACKGROUND_A}};color:{{INK}};font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;user-select:none}canvas{display:block;width:100vw;height:100vh;touch-action:none}
</style></head><body>
<!--
GAME_SPEC_ID: {{ID}}
GAME_KIT: tile-match
STYLE_KIT: {{STYLE_KIT}}
MECHANICS: {{MECHANICS}}
ENEMY_SET: {{ENEMY_SET}}
-->
<canvas id="game" aria-label="{{TITLE}}"></canvas><script>
(() => {
"use strict";
const SPEC = {{SPEC_JSON}},S=SPEC.strings,canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),READY="READY",PLAYING="PLAYING",OVER="OVER",FIXED_DT=1/60;
const p=SPEC.palette,SLOTS=7,SHAPES=["circle","square","triangle","diamond","star","hex"],COLORS=[p.good,p.accent,p.bad,"#60a5fa","#f59e0b","#a78bfa"],particles=[],floats=[];
let width=0,height=0,dpr=1,state=READY,last=0,acc=0,score=0,best=Number(localStorage.getItem("tgg-"+SPEC.id+"-best")||0),timeLeft=SPEC.duration,round=1,shake=0,flash=0,ts=56;
let tiles=[],tray=[];
function resize(){dpr=Math.max(1,Math.min(2,devicePixelRatio||1));width=innerWidth;height=innerHeight;canvas.width=Math.floor(width*dpr);canvas.height=Math.floor(height*dpr);canvas.style.width=width+"px";canvas.style.height=height+"px";ctx.setTransform(dpr,0,0,dpr,0,0);ts=Math.min(64,Math.floor(Math.min(width,height)*.13));if(state!==PLAYING&&tiles.length)layout()}
function reset(){state=PLAYING;score=0;timeLeft=SPEC.duration;round=1;tray=[];particles.length=floats.length=0;layout()}
function layout(){tiles=[];const n=Math.min(54,30+round*6),types=Math.min(6,4+round),per=Math.ceil(n/types/3)*3,pool=[];for(let t=0;t<types;t++)for(let k=0;k<per;k++)pool.push(t);shuffle(pool);const bw=Math.min(width*.78,560),bh=Math.min(height*.48,460),bx=(width-bw)/2,by=Math.max(96,height*.16);for(let i=0;i<pool.length;i++){const layer=i%3;tiles.push({type:pool[i],x:bx+ts/2+Math.random()*(bw-ts),y:by+ts/2+Math.random()*(bh-ts),z:layer*100+i,gone:false})}}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function covered(t){for(const u of tiles)if(!u.gone&&u.z>t.z&&Math.abs(u.x-t.x)<ts*.86&&Math.abs(u.y-t.y)<ts*.86)return true;return false}
function pointerdown(e){e.preventDefault();if(state===READY||state===OVER){reset();return}if(state!==PLAYING)return;const x=e.clientX,y=e.clientY;let pick=null;for(const t of tiles)if(!t.gone&&Math.abs(x-t.x)<ts/2&&Math.abs(y-t.y)<ts/2&&!covered(t)&&(!pick||t.z>pick.z))pick=t;if(pick)take(pick)}
function pointermove(e){e.preventDefault()}function pointerup(e){e.preventDefault()}
canvas.addEventListener("pointerdown",pointerdown);canvas.addEventListener("pointermove",pointermove);canvas.addEventListener("pointerup",pointerup);canvas.addEventListener("pointercancel",pointerup);addEventListener("resize",resize);
function take(t){t.gone=true;tray.push(t.type);burst(t.x,t.y,COLORS[t.type],10);collapse();if(tray.length>SLOTS){over();return}if(tiles.every(x=>x.gone)){round++;score+=60;addFloat("+60",width/2,height*.5,p.accent);layout()}}
function collapse(){let again=true;while(again){again=false;for(let t=0;t<COLORS.length;t++){if(tray.filter(v=>v===t).length>=3){let removed=0;tray=tray.filter(v=>{if(v===t&&removed<3){removed++;return false}return true});score+=Math.round(30*SPEC.tuning.scoreMultiplier);addFloat("+30",width/2,height*.78,p.good);again=true}}}}
function update(dt){if(state!==PLAYING){updateFx(dt);return}timeLeft-=dt;if(timeLeft<=0)over();shake=Math.max(0,shake-dt*3);flash=Math.max(0,flash-dt*3);updateFx(dt)}
function over(){state=OVER;best=Math.max(best,score);localStorage.setItem("tgg-"+SPEC.id+"-best",String(best))}
function updateFx(dt){for(const q of particles){q.x+=q.vx*dt;q.y+=q.vy*dt;q.life-=dt}for(const f of floats){f.y-=42*dt;f.life-=dt}trim(particles,q=>q.life<=0);trim(floats,f=>f.life<=0)}
function render(){ctx.save();if(shake)ctx.translate((Math.random()-.5)*shake*14,(Math.random()-.5)*shake*14);bg();drawTiles();drawTray();fx();hud();if(flash){ctx.fillStyle=alpha(p.bad,flash*.22);ctx.fillRect(0,0,width,height)}if(state!==PLAYING)overlay();ctx.restore()}
function bg(){const g=ctx.createLinearGradient(0,0,0,height);g.addColorStop(0,p.backgroundA);g.addColorStop(1,p.backgroundB);ctx.fillStyle=g;ctx.fillRect(0,0,width,height);const v=ctx.createRadialGradient(width/2,height*.45,height*.2,width/2,height*.5,height*.95);v.addColorStop(0,"rgba(0,0,0,0)");v.addColorStop(1,"rgba(0,0,0,.42)");ctx.fillStyle=v;ctx.fillRect(0,0,width,height)}
function shapePath(shape,cx,cy,r){ctx.beginPath();if(shape==="circle"){ctx.arc(cx,cy,r,0,Math.PI*2);return}if(shape==="square"){ctx.roundRect(cx-r,cy-r,r*2,r*2,r*.3);return}if(shape==="star"){for(let i=0;i<10;i++){const rr=i%2?r*.46:r,a=-Math.PI/2+i*Math.PI/5;const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.closePath();return}const nn=shape==="triangle"?3:shape==="diamond"?4:shape==="hex"?6:0;if(!nn){ctx.arc(cx,cy,r,0,Math.PI*2);return}const rot=shape==="diamond"?0:-Math.PI/2;for(let i=0;i<nn;i++){const a=rot+i*Math.PI*2/nn,x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.closePath()}
function drawSym(cx,cy,type,r){const c=COLORS[type],sh=SHAPES[type];ctx.save();ctx.shadowColor=c;ctx.shadowBlur=8;const g=ctx.createRadialGradient(cx-r*.3,cy-r*.35,r*.1,cx,cy,r*1.1);g.addColorStop(0,lighten(c,.5));g.addColorStop(1,c);shapePath(sh,cx,cy,r);ctx.fillStyle=g;ctx.fill();ctx.restore();ctx.strokeStyle=alpha(p.ink,.3);ctx.lineWidth=2;ctx.stroke()}
function drawTiles(){const sorted=tiles.filter(t=>!t.gone).slice().sort((a,b)=>a.z-b.z);for(const t of sorted){const cov=covered(t);ctx.fillStyle="rgba(0,0,0,.3)";ctx.beginPath();ctx.roundRect(t.x-ts/2+2,t.y-ts/2+3,ts,ts,12);ctx.fill();ctx.fillStyle=cov?alpha(p.ink,.14):alpha(p.ink,.06);ctx.beginPath();ctx.roundRect(t.x-ts/2,t.y-ts/2,ts,ts,12);ctx.fill();ctx.strokeStyle=alpha(p.ink,.2);ctx.lineWidth=1.5;ctx.stroke();ctx.globalAlpha=cov?.5:1;drawSym(t.x,t.y,t.type,ts*.3);ctx.globalAlpha=1}}
function drawTray(){const tw=Math.min(width*.92,460),sw=tw/SLOTS,tx=(width-tw)/2,ty=height-sw-26;ctx.fillStyle=alpha(p.ink,.08);ctx.beginPath();ctx.roundRect(tx-6,ty-6,tw+12,sw+12,14);ctx.fill();for(let i=0;i<SLOTS;i++){ctx.strokeStyle=alpha(p.ink,.2);ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(tx+i*sw+3,ty+3,sw-6,sw-6,10);ctx.stroke()}for(let i=0;i<tray.length;i++)drawSym(tx+i*sw+sw/2,ty+sw/2,tray[i],sw*.3)}
function fx(){for(const q of particles){ctx.globalAlpha=Math.max(0,q.life*2);ctx.fillStyle=q.color;ctx.fillRect(q.x,q.y,q.size,q.size)}ctx.globalAlpha=1;for(const f of floats){ctx.globalAlpha=Math.max(0,f.life);text(f.text,f.x,f.y,16,f.color,"center")}ctx.globalAlpha=1}
function hud(){if(state===READY)return;text(SPEC.title,20,30,21,p.ink,"left");text(S.score+" "+score+"  "+S.best+" "+best,20,58,13,p.ink,"left");text(S.time.replace("{n}",Math.ceil(timeLeft)),width-20,32,22,timeLeft<10?p.bad:p.ink,"right")}
function overlay(){ctx.fillStyle="rgba(0,0,0,.66)";ctx.fillRect(0,0,width,height);text(SPEC.title,width/2,height*.4,34,p.ink,"center");text(SPEC.roles.objective,width/2,height*.4+40,15,p.ink,"center");text(state===OVER?S.restart:S.start,width/2,height*.4+92,24,p.accent,"center");if(state===OVER)text(S.score+" "+score+"  "+S.best+" "+best,width/2,height*.4+128,15,p.ink,"center")}
function burst(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=40+Math.random()*110;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.5,size:3+Math.random()*5,color:c})}}
function addFloat(t,x,y,c){floats.push({text:t,x,y,life:.9,color:c})}
function trim(a,pred){for(let i=a.length-1;i>=0;i--)if(pred(a[i]))a.splice(i,1)}
function alpha(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}
function lighten(hex,t){const n=parseInt(hex.slice(1),16),r=n>>16&255,g=n>>8&255,b=n&255,m=v=>Math.round(v+(255-v)*t);return`rgb(${m(r)},${m(g)},${m(b)})`}
function text(t,x,y,s,c,a){ctx.fillStyle=c;ctx.font=`900 ${s}px system-ui`;ctx.textAlign=a;ctx.textBaseline="middle";ctx.fillText(t,x,y)}
function tick(now){if(!last)last=now;const frame=Math.min(.05,(now-last)/1000);last=now;acc+=frame;while(acc>=FIXED_DT){update(FIXED_DT);acc-=FIXED_DT}render();requestAnimationFrame(tick)}
resize();requestAnimationFrame(tick);
})();
</script></body></html>
