<!doctype html>
<html lang="{{LANG}}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>{{TITLE}}</title><link rel="icon" href="data:,"><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:{{BACKGROUND_A}};color:{{INK}};font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;user-select:none}canvas{display:block;width:100vw;height:100vh;touch-action:none}
</style></head><body>
<!--
GAME_SPEC_ID: {{ID}}
GAME_KIT: physics-arc
STYLE_KIT: {{STYLE_KIT}}
MECHANICS: {{MECHANICS}}
ENEMY_SET: {{ENEMY_SET}}
-->
<canvas id="game" aria-label="{{TITLE}}"></canvas><script>
(() => {
"use strict";
const SPEC = {{SPEC_JSON}},S=SPEC.strings,canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),READY="READY",PLAYING="PLAYING",OVER="OVER",FIXED_DT=1/60;
let width=0,height=0,dpr=1,state=READY,last=0,acc=0,score=0,best=Number(localStorage.getItem("tgg-"+SPEC.id+"-best")||0),timeLeft=SPEC.duration,shots=8,level=1,drag=null,shake=0,flash=0;
const p=SPEC.palette,projectiles=[],targets=[],blocks=[],particles=[],floats=[],launcher={x:0,y:0};
function resize(){dpr=Math.max(1,Math.min(2,devicePixelRatio||1));width=innerWidth;height=innerHeight;canvas.width=Math.floor(width*dpr);canvas.height=Math.floor(height*dpr);canvas.style.width=width+"px";canvas.style.height=height+"px";ctx.setTransform(dpr,0,0,dpr,0,0);launcher.x=width*.18;launcher.y=height*.76}
function reset(){state=PLAYING;score=0;timeLeft=SPEC.duration;shots=8;level=1;projectiles.length=targets.length=blocks.length=particles.length=floats.length=0;spawnStage()}
function spawnStage(){targets.length=0;blocks.length=0;for(let i=0;i<3;i++)targets.push({x:width*(.62+.1*Math.random()),y:height*(.28+i*.18),r:22,hp:1+Math.floor(level/3),hit:false});for(let i=0;i<2;i++)blocks.push({x:width*(.42+.16*i),y:height*(.38+.18*Math.random()),w:34,h:110})}
function pointerdown(e){e.preventDefault();if(state===READY||state===OVER){reset();return}if(shots<=0)return;drag={x:e.clientX,y:e.clientY}}
function pointermove(e){e.preventDefault();if(drag){drag.x=e.clientX;drag.y=e.clientY}}function pointerup(e){e.preventDefault();if(!drag||state!==PLAYING){drag=null;return}const dx=launcher.x-drag.x,dy=launcher.y-drag.y,power=Math.min(680,Math.hypot(dx,dy)*4);projectiles.push({x:launcher.x,y:launcher.y,vx:dx/Math.max(1,Math.hypot(dx,dy))*power,vy:dy/Math.max(1,Math.hypot(dx,dy))*power,r:11,life:4});shots--;drag=null}
canvas.addEventListener("pointerdown",pointerdown);canvas.addEventListener("pointermove",pointermove);canvas.addEventListener("pointerup",pointerup);canvas.addEventListener("pointercancel",pointerup);addEventListener("resize",resize);
function update(dt){if(state!==PLAYING){updateFx(dt);return}timeLeft-=dt;if(timeLeft<=0||shots<=0&&projectiles.length===0)over();for(const pr of projectiles){pr.vy+=540*dt;pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.life-=dt;for(const b of blocks)if(pr.x>b.x&&pr.x<b.x+b.w&&pr.y>b.y&&pr.y<b.y+b.h){pr.vx*=-.65;pr.x+=Math.sign(pr.vx)*8;burst(pr.x,pr.y,p.ink,6)}for(const t of targets)if(!t.hit&&Math.hypot(pr.x-t.x,pr.y-t.y)<pr.r+t.r){t.hp--;pr.life=0;burst(t.x,t.y,p.good,22);if(t.hp<=0){t.hit=true;const gain=40+level*5;score+=gain;addFloat("+"+gain,t.x,t.y,p.good)}}if(pr.y>height+80||pr.x>width+80||pr.life<=0)pr.done=true}trim(projectiles,q=>q.done);if(targets.length&&targets.every(t=>t.hit)){level++;shots+=3;score+=80;addFloat(S.stage,width/2,height*.24,p.accent);spawnStage()}shake=Math.max(0,shake-dt*3);flash=Math.max(0,flash-dt*3);updateFx(dt)}
function over(){state=OVER;best=Math.max(best,score);localStorage.setItem("tgg-"+SPEC.id+"-best",String(best))}
function updateFx(dt){for(const q of particles){q.x+=q.vx*dt;q.y+=q.vy*dt;q.life-=dt}for(const f of floats){f.y-=42*dt;f.life-=dt}trim(particles,q=>q.life<=0);trim(floats,f=>f.life<=0)}
function render(){ctx.save();bg();scene();fx();hud();if(state!==PLAYING)overlay();ctx.restore()}
function bg(){const g=ctx.createLinearGradient(0,0,0,height);g.addColorStop(0,p.backgroundA);g.addColorStop(1,p.backgroundB);ctx.fillStyle=g;ctx.fillRect(0,0,width,height);const v=ctx.createRadialGradient(width/2,height*.45,height*.2,width/2,height*.5,height*.95);v.addColorStop(0,"rgba(0,0,0,0)");v.addColorStop(1,"rgba(0,0,0,.4)");ctx.fillStyle=v;ctx.fillRect(0,0,width,height)}
function scene(){const gg=ctx.createLinearGradient(0,height*.82,0,height);gg.addColorStop(0,alpha(p.ink,.18));gg.addColorStop(1,alpha(p.ink,.04));ctx.fillStyle=gg;ctx.fillRect(0,height*.82,width,height*.18);for(const b of blocks){const g=ctx.createLinearGradient(b.x,0,b.x+b.w,0);g.addColorStop(0,alpha(p.bad,.6));g.addColorStop(1,alpha(p.bad,.38));ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,8);ctx.fill();ctx.strokeStyle=alpha(p.ink,.3);ctx.lineWidth=2;ctx.stroke()}for(const t of targets){if(t.hit)continue;ctx.save();ctx.shadowColor=p.good;ctx.shadowBlur=14;const g=ctx.createRadialGradient(t.x-t.r*.3,t.y-t.r*.3,t.r*.1,t.x,t.y,t.r*1.2);g.addColorStop(0,lighten(p.good,.55));g.addColorStop(1,p.good);ctx.fillStyle=g;ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.fill();ctx.restore();ctx.strokeStyle=alpha(p.backgroundA,.7);ctx.lineWidth=3;ctx.beginPath();ctx.arc(t.x,t.y,t.r*.6,0,Math.PI*2);ctx.stroke();ctx.strokeStyle=p.ink;ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.stroke();text(String(t.hp),t.x,t.y,14,p.backgroundA,"center")}if(drag){const dx=launcher.x-drag.x,dy=launcher.y-drag.y,h=Math.max(1,Math.hypot(dx,dy)),power=Math.min(680,h*4);let sx=launcher.x,sy=launcher.y,vx=dx/h*power,vy=dy/h*power;ctx.fillStyle=alpha(p.ink,.5);for(let i=0;i<18;i++){sx+=vx*.05;sy+=vy*.05;vy+=540*.05;if(i%2===0){ctx.beginPath();ctx.arc(sx,sy,3,0,Math.PI*2);ctx.fill()}}ctx.strokeStyle=alpha(p.accent,.6);ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(launcher.x,launcher.y);ctx.lineTo(drag.x,drag.y);ctx.stroke()}const aim=drag?Math.atan2(launcher.y-drag.y,launcher.x-drag.x):-Math.PI/4;ctx.save();ctx.translate(launcher.x,launcher.y);ctx.rotate(aim);ctx.fillStyle=p.ink;ctx.beginPath();ctx.roundRect(0,-9,34,18,9);ctx.fill();ctx.restore();const lg=ctx.createRadialGradient(launcher.x-8,launcher.y-8,4,launcher.x,launcher.y,26);lg.addColorStop(0,lighten(p.accent,.5));lg.addColorStop(1,p.accent);ctx.save();ctx.shadowColor=p.accent;ctx.shadowBlur=16;ctx.fillStyle=lg;ctx.beginPath();ctx.arc(launcher.x,launcher.y,24,0,Math.PI*2);ctx.fill();ctx.restore();ctx.strokeStyle=p.ink;ctx.lineWidth=3;ctx.stroke();ctx.save();ctx.shadowColor=p.accent;ctx.shadowBlur=12;ctx.fillStyle=lighten(p.accent,.3);for(const pr of projectiles){ctx.beginPath();ctx.arc(pr.x,pr.y,pr.r,0,Math.PI*2);ctx.fill()}ctx.restore()}
function hud(){if(state===READY)return;text(SPEC.title,20,30,22,p.ink,"left");text(S.score+" "+score+" "+S.best+" "+best,20,58,13,p.ink,"left");text(S.shots+" "+shots+" "+S.stage+" "+level,width-20,32,15,p.ink,"right");text(S.time.replace("{n}",Math.ceil(timeLeft)),width-20,60,22,timeLeft<10?p.bad:p.ink,"right")}
function fx(){for(const q of particles){ctx.globalAlpha=q.life*2;ctx.fillStyle=q.color;ctx.fillRect(q.x,q.y,q.size,q.size)}ctx.globalAlpha=1;for(const f of floats){ctx.globalAlpha=f.life;text(f.text,f.x,f.y,16,f.color,"center")}ctx.globalAlpha=1}
function overlay(){ctx.fillStyle="rgba(0,0,0,.66)";ctx.fillRect(0,0,width,height);text(SPEC.title,width/2,height*.43,36,p.ink,"center");text(SPEC.roles.objective,width/2,height*.43+42,15,p.ink,"center");text(state===OVER?S.restart:S.start,width/2,height*.43+94,25,p.accent,"center");if(state===OVER)text(S.score+" "+score+" "+S.best+" "+best,width/2,height*.43+130,15,p.ink,"center")}
function burst(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=45+Math.random()*150;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.55,size:3+Math.random()*5,color:c})}}function addFloat(t,x,y,c){floats.push({text:t,x,y,life:.9,color:c})}function trim(a,pred){for(let i=a.length-1;i>=0;i--)if(pred(a[i]))a.splice(i,1)}function alpha(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}function lighten(hex,t){const n=parseInt(hex.slice(1),16),r=n>>16&255,g=n>>8&255,b=n&255,m=v=>Math.round(v+(255-v)*t);return`rgb(${m(r)},${m(g)},${m(b)})`}function text(t,x,y,s,c,a){ctx.fillStyle=c;ctx.font=`900 ${s}px system-ui`;ctx.textAlign=a;ctx.textBaseline="middle";ctx.fillText(t,x,y)}
function tick(now){if(!last)last=now;const frame=Math.min(.05,(now-last)/1000);last=now;acc+=frame;while(acc>=FIXED_DT){update(FIXED_DT);acc-=FIXED_DT}render();requestAnimationFrame(tick)}resize();requestAnimationFrame(tick);
})();
</script></body></html>
