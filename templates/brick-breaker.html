<!doctype html>
<html lang="{{LANG}}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>{{TITLE}}</title><link rel="icon" href="data:,"><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:{{BACKGROUND_A}};color:{{INK}};font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;user-select:none}canvas{display:block;width:100vw;height:100vh;touch-action:none}
</style></head><body>
<!--
GAME_SPEC_ID: {{ID}}
GAME_KIT: brick-breaker
STYLE_KIT: {{STYLE_KIT}}
MECHANICS: {{MECHANICS}}
ENEMY_SET: {{ENEMY_SET}}
-->
<canvas id="game" aria-label="{{TITLE}}"></canvas><script>
(() => {
"use strict";
const SPEC = {{SPEC_JSON}},S=SPEC.strings,canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),READY="READY",PLAYING="PLAYING",OVER="OVER",FIXED_DT=1/60;
const p=SPEC.palette,ROWCOL=[p.bad,p.accent,"#f59e0b","#60a5fa",p.good],particles=[],floats=[];
let width=0,height=0,dpr=1,state=READY,last=0,acc=0,score=0,best=Number(localStorage.getItem("tgg-"+SPEC.id+"-best")||0),timeLeft=SPEC.duration,lives=3,level=1,combo=0,shake=0,flash=0;
const paddle={x:0,y:0,w:120,h:16},ball={x:0,y:0,vx:0,vy:0,r:9,stuck:true},bricks=[];
function resize(){dpr=Math.max(1,Math.min(2,devicePixelRatio||1));width=innerWidth;height=innerHeight;canvas.width=Math.floor(width*dpr);canvas.height=Math.floor(height*dpr);canvas.style.width=width+"px";canvas.style.height=height+"px";ctx.setTransform(dpr,0,0,dpr,0,0);paddle.w=Math.min(150,width*.26);paddle.y=height-70;if(ball.stuck){paddle.x=width/2;resetBall()}}
function reset(){state=PLAYING;score=0;timeLeft=SPEC.duration;lives=3;level=1;combo=0;particles.length=floats.length=0;buildBricks();resetBall()}
function buildBricks(){bricks.length=0;const cols=Math.max(5,Math.min(9,Math.floor(width/86))),rows=Math.min(5,3+Math.floor(level/2)),gap=8,bw=(Math.min(width*.92,760)-gap*(cols-1))/cols,bh=26,x0=(width-(bw*cols+gap*(cols-1)))/2,y0=Math.max(96,height*.14);for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)bricks.push({x:x0+c*(bw+gap),y:y0+r*(bh+gap),w:bw,h:bh,hp:1+Math.floor((rows-r)/2),max:1+Math.floor((rows-r)/2),color:ROWCOL[r%ROWCOL.length],alive:true})}
function resetBall(){ball.stuck=true;ball.x=paddle.x;ball.y=paddle.y-ball.r-2;ball.vx=0;ball.vy=0}
function launch(){ball.stuck=false;const sp=380*SPEC.tuning.speed;ball.vx=sp*.5*(Math.random()<.5?-1:1);ball.vy=-sp}
function pointerdown(e){e.preventDefault();if(state===READY||state===OVER){reset();return}paddle.x=clamp(e.clientX,paddle.w/2,width-paddle.w/2);if(ball.stuck)launch()}
function pointermove(e){e.preventDefault();if(state===PLAYING)paddle.x=clamp(e.clientX,paddle.w/2,width-paddle.w/2)}
function pointerup(e){e.preventDefault()}
canvas.addEventListener("pointerdown",pointerdown);canvas.addEventListener("pointermove",pointermove);canvas.addEventListener("pointerup",pointerup);canvas.addEventListener("pointercancel",pointerup);addEventListener("resize",resize);
function update(dt){if(state!==PLAYING){updateFx(dt);return}timeLeft-=dt;if(timeLeft<=0)over();if(ball.stuck){ball.x=paddle.x;ball.y=paddle.y-ball.r-2}else{ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;if(ball.x<ball.r){ball.x=ball.r;ball.vx=Math.abs(ball.vx)}if(ball.x>width-ball.r){ball.x=width-ball.r;ball.vx=-Math.abs(ball.vx)}if(ball.y<ball.r){ball.y=ball.r;ball.vy=Math.abs(ball.vy)}if(ball.y-ball.r>paddle.y-paddle.h&&ball.y<paddle.y+30&&Math.abs(ball.x-paddle.x)<paddle.w/2+ball.r&&ball.vy>0){const rel=(ball.x-paddle.x)/(paddle.w/2),sp=Math.hypot(ball.vx,ball.vy);const ang=rel*1.05;ball.vx=Math.sin(ang)*sp;ball.vy=-Math.abs(Math.cos(ang)*sp);ball.y=paddle.y-paddle.h-ball.r;combo=0}for(const b of bricks){if(!b.alive)continue;if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){const px=Math.min(ball.x+ball.r-b.x,b.x+b.w-(ball.x-ball.r)),py=Math.min(ball.y+ball.r-b.y,b.y+b.h-(ball.y-ball.r));if(px<py){ball.vx=-ball.vx}else{ball.vy=-ball.vy}b.hp--;burst(ball.x,ball.y,b.color,8);if(b.hp<=0){b.alive=false;combo++;const g=Math.round(10*(1+Math.floor(combo/3))*SPEC.tuning.scoreMultiplier);score+=g;addFloat("+"+g,b.x+b.w/2,b.y,p.good)}break}}if(ball.y-ball.r>height){lives--;shake=.3;flash=.4;combo=0;if(lives<=0)over();else resetBall()}if(bricks.every(b=>!b.alive)){level++;score+=50;buildBricks();resetBall()}}shake=Math.max(0,shake-dt*3);flash=Math.max(0,flash-dt*3);updateFx(dt)}
function over(){state=OVER;best=Math.max(best,score);localStorage.setItem("tgg-"+SPEC.id+"-best",String(best))}
function updateFx(dt){for(const q of particles){q.x+=q.vx*dt;q.y+=q.vy*dt;q.life-=dt}for(const f of floats){f.y-=42*dt;f.life-=dt}trim(particles,q=>q.life<=0);trim(floats,f=>f.life<=0)}
function render(){ctx.save();if(shake)ctx.translate((Math.random()-.5)*shake*16,(Math.random()-.5)*shake*16);bg();drawBricks();drawPaddle();drawBall();fx();hud();if(flash){ctx.fillStyle=alpha(p.bad,flash*.22);ctx.fillRect(0,0,width,height)}if(state!==PLAYING)overlay();ctx.restore()}
function bg(){const g=ctx.createLinearGradient(0,0,0,height);g.addColorStop(0,p.backgroundA);g.addColorStop(1,p.backgroundB);ctx.fillStyle=g;ctx.fillRect(0,0,width,height);const v=ctx.createRadialGradient(width/2,height*.45,height*.2,width/2,height*.5,height*.95);v.addColorStop(0,"rgba(0,0,0,0)");v.addColorStop(1,"rgba(0,0,0,.42)");ctx.fillStyle=v;ctx.fillRect(0,0,width,height)}
function drawBricks(){for(const b of bricks){if(!b.alive)continue;const c=b.color,t=b.hp/b.max;ctx.fillStyle="rgba(0,0,0,.22)";ctx.beginPath();ctx.roundRect(b.x+1,b.y+2,b.w,b.h,7);ctx.fill();const g=ctx.createLinearGradient(0,b.y,0,b.y+b.h);g.addColorStop(0,lighten(c,.4*t+.1));g.addColorStop(1,c);ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,7);ctx.fill();ctx.fillStyle="rgba(255,255,255,.18)";ctx.beginPath();ctx.roundRect(b.x+4,b.y+3,b.w-8,5,3);ctx.fill();ctx.strokeStyle=alpha(p.ink,.25);ctx.lineWidth=1.5;ctx.stroke()}}
function drawPaddle(){const x=paddle.x,y=paddle.y;ctx.fillStyle="rgba(0,0,0,.3)";ctx.beginPath();ctx.roundRect(x-paddle.w/2,y+3,paddle.w,paddle.h,9);ctx.fill();const g=ctx.createLinearGradient(0,y,0,y+paddle.h);g.addColorStop(0,lighten(p.accent,.5));g.addColorStop(1,p.accent);ctx.save();ctx.shadowColor=p.accent;ctx.shadowBlur=14;ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(x-paddle.w/2,y,paddle.w,paddle.h,9);ctx.fill();ctx.restore();ctx.strokeStyle=p.ink;ctx.lineWidth=2;ctx.stroke()}
function drawBall(){ctx.save();ctx.shadowColor=p.ink;ctx.shadowBlur=12;const g=ctx.createRadialGradient(ball.x-3,ball.y-3,2,ball.x,ball.y,ball.r);g.addColorStop(0,"#fff");g.addColorStop(1,p.ink);ctx.fillStyle=g;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.restore()}
function fx(){for(const q of particles){ctx.globalAlpha=Math.max(0,q.life*2);ctx.fillStyle=q.color;ctx.fillRect(q.x,q.y,q.size,q.size)}ctx.globalAlpha=1;for(const f of floats){ctx.globalAlpha=Math.max(0,f.life);text(f.text,f.x,f.y,16,f.color,"center")}ctx.globalAlpha=1}
function hud(){if(state===READY)return;text(SPEC.title,20,30,21,p.ink,"left");text(S.score+" "+score+"  "+S.best+" "+best,20,58,13,p.ink,"left");text(S.lives+" "+lives+"  "+S.level+" "+level,width-20,32,15,p.ink,"right");text(S.time.replace("{n}",Math.ceil(timeLeft)),width-20,60,20,timeLeft<10?p.bad:p.ink,"right")}
function overlay(){ctx.fillStyle="rgba(0,0,0,.66)";ctx.fillRect(0,0,width,height);text(SPEC.title,width/2,height*.4,34,p.ink,"center");text(SPEC.roles.objective,width/2,height*.4+40,15,p.ink,"center");text(state===OVER?S.restart:S.start,width/2,height*.4+92,24,p.accent,"center");if(state===OVER)text(S.score+" "+score+"  "+S.best+" "+best,width/2,height*.4+128,15,p.ink,"center")}
function burst(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=40+Math.random()*120;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.5,size:3+Math.random()*4,color:c})}}
function addFloat(t,x,y,c){floats.push({text:t,x,y,life:.9,color:c})}
function trim(a,pred){for(let i=a.length-1;i>=0;i--)if(pred(a[i]))a.splice(i,1)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function alpha(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}
function lighten(hex,t){const n=parseInt(hex.slice(1),16),r=n>>16&255,g=n>>8&255,b=n&255,m=v=>Math.round(v+(255-v)*t);return`rgb(${m(r)},${m(g)},${m(b)})`}
function text(t,x,y,s,c,a){ctx.fillStyle=c;ctx.font=`900 ${s}px system-ui`;ctx.textAlign=a;ctx.textBaseline="middle";ctx.fillText(t,x,y)}
function tick(now){if(!last)last=now;const frame=Math.min(.05,(now-last)/1000);last=now;acc+=frame;while(acc>=FIXED_DT){update(FIXED_DT);acc-=FIXED_DT}render();requestAnimationFrame(tick)}
resize();requestAnimationFrame(tick);
})();
</script></body></html>
