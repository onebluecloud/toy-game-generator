<!doctype html>
<html lang="{{LANG}}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>{{TITLE}}</title><link rel="icon" href="data:,"><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:{{BACKGROUND_A}};color:{{INK}};font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;user-select:none}canvas{display:block;width:100vw;height:100vh;touch-action:none}
</style></head><body>
<!--
GAME_SPEC_ID: {{ID}}
GAME_KIT: grid-tactics
STYLE_KIT: {{STYLE_KIT}}
MECHANICS: {{MECHANICS}}
ENEMY_SET: {{ENEMY_SET}}
-->
<canvas id="game" aria-label="{{TITLE}}"></canvas><script>
(() => {
"use strict";
const SPEC = {{SPEC_JSON}},S=SPEC.strings,canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),READY="READY",PLAYING="PLAYING",OVER="OVER",FIXED_DT=1/60;
let width=0,height=0,dpr=1,state=READY,last=0,acc=0,score=0,best=Number(localStorage.getItem("tgg-"+SPEC.id+"-best")||0),timeLeft=SPEC.duration,turn=1,locks=4,flash=0,notice="",noticeTime=0;
const p=SPEC.palette,N=5,blocked=new Set(),secured=new Set(),enemies=[],particles=[],floats=[];let tile=74,ox=0,oy=0,player={x:2,y:4};
function resize(){dpr=Math.max(1,Math.min(2,devicePixelRatio||1));width=innerWidth;height=innerHeight;canvas.width=Math.floor(width*dpr);canvas.height=Math.floor(height*dpr);canvas.style.width=width+"px";canvas.style.height=height+"px";ctx.setTransform(dpr,0,0,dpr,0,0);tile=Math.min(88,Math.floor(Math.min(width*.7,height*.68)/N));ox=(width-tile*N)/2;oy=(height-tile*N)/2+22}
function reset(){state=PLAYING;score=0;timeLeft=SPEC.duration;turn=1;locks=4;player={x:2,y:4};blocked.clear();secured.clear();enemies.length=particles.length=floats.length=0;spawnEnemy();spawnEnemy()}
function pointerdown(e){e.preventDefault();if(state===READY||state===OVER){reset();return}const gx=Math.floor((e.clientX-ox)/tile),gy=Math.floor((e.clientY-oy)/tile);if(gx<0||gx>=N||gy<0||gy>=N)return;const key=gx+","+gy;if(Math.abs(gx-player.x)+Math.abs(gy-player.y)===1&&!blocked.has(key)){player.x=gx;player.y=gy;secured.add(key);score+=8;enemyTurn()}else if(locks>0&&!blocked.has(key)&&!(gx===player.x&&gy===player.y)){blocked.add(key);locks--;score+=12;burst(ox+gx*tile+tile/2,oy+gy*tile+tile/2,p.accent,12);enemyTurn()}else{flash=.18}}
function pointermove(e){e.preventDefault()}function pointerup(e){e.preventDefault()}
canvas.addEventListener("pointerdown",pointerdown);canvas.addEventListener("pointermove",pointermove);canvas.addEventListener("pointerup",pointerup);canvas.addEventListener("pointercancel",pointerup);addEventListener("resize",resize);
function enemyTurn(){turn++;if(turn%3===0)spawnEnemy();for(const e of enemies){if(e.dead)continue;const dx=Math.sign(player.x-e.x),dy=Math.sign(player.y-e.y);const nx=e.x+(Math.abs(player.x-e.x)>Math.abs(player.y-e.y)?dx:0),ny=e.y+(Math.abs(player.y-e.y)>=Math.abs(player.x-e.x)?dy:0);const key=nx+","+ny;if(!blocked.has(key)){e.x=nx;e.y=ny}if(e.x===player.x&&e.y===player.y){flash=.35;locks=Math.max(0,locks-1);notice="Breach";noticeTime=.8;e.dead=true}}trim(enemies,e=>e.dead);if(enemies.length>7||locks<=0&&enemies.some(e=>Math.abs(e.x-player.x)+Math.abs(e.y-player.y)<=1))over()}
function spawnEnemy(){const x=Math.floor(Math.random()*N);enemies.push({x,y:0,dead:false})}
function update(dt){if(state!==PLAYING){updateFx(dt);return}timeLeft-=dt;if(timeLeft<=0)over();flash=Math.max(0,flash-dt*3);noticeTime=Math.max(0,noticeTime-dt);updateFx(dt)}
function over(){state=OVER;best=Math.max(best,score);localStorage.setItem("tgg-"+SPEC.id+"-best",String(best))}
function updateFx(dt){for(const q of particles){q.x+=q.vx*dt;q.y+=q.vy*dt;q.life-=dt}for(const f of floats){f.y-=36*dt;f.life-=dt}trim(particles,q=>q.life<=0);trim(floats,f=>f.life<=0)}
function render(){ctx.save();bg();grid();units();fx();hud();if(flash){ctx.fillStyle=alpha(p.bad,flash*.24);ctx.fillRect(0,0,width,height)}if(state!==PLAYING)overlay();ctx.restore()}
function bg(){ctx.fillStyle=p.backgroundA;ctx.fillRect(0,0,width,height);ctx.strokeStyle=alpha(p.good,.08);for(let x=0;x<width;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,height);ctx.stroke()}}
function grid(){for(let y=0;y<N;y++)for(let x=0;x<N;x++){const key=x+","+y;ctx.fillStyle=blocked.has(key)?alpha(p.bad,.35):secured.has(key)?alpha(p.good,.22):alpha(p.ink,.06);ctx.beginPath();ctx.roundRect(ox+x*tile+5,oy+y*tile+5,tile-10,tile-10,10);ctx.fill();ctx.strokeStyle=alpha(p.ink,.24);ctx.stroke()}if(noticeTime>0)text(notice,width/2,oy-28,22,p.bad,"center")}
function units(){for(const e of enemies){ctx.fillStyle=p.bad;ctx.beginPath();ctx.roundRect(ox+e.x*tile+tile*.25,oy+e.y*tile+tile*.25,tile*.5,tile*.5,10);ctx.fill()}ctx.fillStyle=p.accent;ctx.beginPath();ctx.arc(ox+player.x*tile+tile/2,oy+player.y*tile+tile/2,tile*.28,0,Math.PI*2);ctx.fill();ctx.strokeStyle=p.ink;ctx.lineWidth=3;ctx.stroke()}
function hud(){if(state===READY)return;text(SPEC.title,20,30,22,p.ink,"left");text(S.score+" "+score+" "+S.best+" "+best,20,58,13,p.ink,"left");text(S.turn+" "+turn+" "+S.locks+" "+locks,width-20,32,15,p.ink,"right");text(S.time.replace("{n}",Math.ceil(timeLeft)),width-20,60,22,timeLeft<10?p.bad:p.ink,"right")}
function fx(){for(const q of particles){ctx.globalAlpha=q.life*2;ctx.fillStyle=q.color;ctx.fillRect(q.x,q.y,q.size,q.size)}ctx.globalAlpha=1;for(const f of floats){ctx.globalAlpha=f.life;text(f.text,f.x,f.y,16,f.color,"center")}ctx.globalAlpha=1}
function overlay(){ctx.fillStyle="rgba(0,0,0,.70)";ctx.fillRect(0,0,width,height);text(SPEC.title,width/2,height*.43,36,p.ink,"center");text(SPEC.roles.objective,width/2,height*.43+42,15,p.ink,"center");text(state===OVER?S.restart:S.start,width/2,height*.43+94,25,p.accent,"center");if(state===OVER)text(S.score+" "+score+" "+S.best+" "+best,width/2,height*.43+130,15,p.ink,"center")}
function burst(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=35+Math.random()*100;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.5,size:3+Math.random()*5,color:c})}}function trim(a,pred){for(let i=a.length-1;i>=0;i--)if(pred(a[i]))a.splice(i,1)}function alpha(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}function text(t,x,y,s,c,a){ctx.fillStyle=c;ctx.font=`900 ${s}px system-ui`;ctx.textAlign=a;ctx.textBaseline="middle";ctx.fillText(t,x,y)}
function tick(now){if(!last)last=now;const frame=Math.min(.05,(now-last)/1000);last=now;acc+=frame;while(acc>=FIXED_DT){update(FIXED_DT);acc-=FIXED_DT}render();requestAnimationFrame(tick)}resize();requestAnimationFrame(tick);
})();
</script></body></html>
