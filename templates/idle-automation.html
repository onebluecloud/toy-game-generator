<!doctype html>
<html lang="{{LANG}}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>{{TITLE}}</title><link rel="icon" href="data:,"><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:{{BACKGROUND_A}};color:{{INK}};font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;user-select:none}canvas{display:block;width:100vw;height:100vh;touch-action:none}
</style></head><body>
<!--
GAME_SPEC_ID: {{ID}}
GAME_KIT: idle-automation
STYLE_KIT: {{STYLE_KIT}}
MECHANICS: {{MECHANICS}}
ENEMY_SET: {{ENEMY_SET}}
-->
<canvas id="game" aria-label="{{TITLE}}"></canvas><script>
(() => {
"use strict";
const SPEC = {{SPEC_JSON}},S=SPEC.strings,canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),READY="READY",PLAYING="PLAYING",OVER="OVER",FIXED_DT=1/60;
let width=0,height=0,dpr=1,state=READY,last=0,acc=0,score=0,best=Number(localStorage.getItem("tgg-"+SPEC.id+"-best")||0),timeLeft=SPEC.duration,cash=30,flash=0,notice="",noticeTime=0;
const p=SPEC.palette,stations=[],rects=[],particles=[],floats=[];
function resize(){dpr=Math.max(1,Math.min(2,devicePixelRatio||1));width=innerWidth;height=innerHeight;canvas.width=Math.floor(width*dpr);canvas.height=Math.floor(height*dpr);canvas.style.width=width+"px";canvas.style.height=height+"px";ctx.setTransform(dpr,0,0,dpr,0,0);layout()}
function layout(){rects.length=0;const w=Math.min(230,width*.25),gap=24,total=stations.length*w+(stations.length-1)*gap,x0=(width-total)/2,y=height*.42;for(let i=0;i<stations.length;i++)rects.push({x:x0+i*(w+gap),y,w,h:150,station:stations[i]})}
function reset(){state=PLAYING;score=0;cash=30;timeLeft=SPEC.duration;notice="";stations.length=0;particles.length=floats.length=0;for(const name of (S.stations||["Input","Process","Output"]))stations.push({name,level:1,progress:0,rate:.28+Math.random()*.08,bottleneck:false});layout()}
function pointerdown(e){e.preventDefault();if(state===READY||state===OVER){reset();return}for(const r of rects)if(inside(e.clientX,e.clientY,r)){upgrade(r.station,r.x+r.w/2,r.y+60);return}}
function pointermove(e){e.preventDefault()}function pointerup(e){e.preventDefault()}
canvas.addEventListener("pointerdown",pointerdown);canvas.addEventListener("pointermove",pointermove);canvas.addEventListener("pointerup",pointerup);canvas.addEventListener("pointercancel",pointerup);addEventListener("resize",resize);
function upgrade(s,x,y){const cost=s.bottleneck?18:20+s.level*12;if(cash<cost){flash=.22;notice=S.needCash;noticeTime=.8;return}cash-=cost;if(s.bottleneck){s.bottleneck=false;notice=S.bottleneckCleared;burst(x,y,p.good,16)}else{s.level++;s.rate+=.08;notice=s.name+" "+S.upgraded;burst(x,y,p.accent,16)}noticeTime=.9}
function update(dt){if(state!==PLAYING){updateFx(dt);return}timeLeft-=dt;if(timeLeft<=0)over();for(const s of stations){const slow=s.bottleneck?.28:1;s.progress+=dt*s.rate*s.level*slow*SPEC.tuning.speed;if(s.progress>=1){s.progress-=1;const gain=Math.round((6+s.level*4)*SPEC.tuning.scoreMultiplier);cash+=gain;score+=gain;addFloat("+"+gain,rectX(s),height*.35,p.good);if(Math.random()<.08+s.level*.01)s.bottleneck=true}}flash=Math.max(0,flash-dt*3);noticeTime=Math.max(0,noticeTime-dt);updateFx(dt)}
function rectX(s){const r=rects.find(r=>r.station===s);return r?r.x+r.w/2:width/2}
function over(){state=OVER;best=Math.max(best,score);localStorage.setItem("tgg-"+SPEC.id+"-best",String(best))}
function updateFx(dt){for(const q of particles){q.x+=q.vx*dt;q.y+=q.vy*dt;q.life-=dt}for(const f of floats){f.y-=34*dt;f.life-=dt}trim(particles,q=>q.life<=0);trim(floats,f=>f.life<=0)}
function render(){ctx.save();bg();line();stationsDraw();fx();hud();if(flash){ctx.fillStyle=alpha(p.bad,flash*.22);ctx.fillRect(0,0,width,height)}if(state!==PLAYING)overlay();ctx.restore()}
function bg(){const g=ctx.createLinearGradient(0,0,0,height);g.addColorStop(0,p.backgroundA);g.addColorStop(1,p.backgroundB);ctx.fillStyle=g;ctx.fillRect(0,0,width,height);const v=ctx.createRadialGradient(width/2,height*.45,height*.2,width/2,height*.5,height*.95);v.addColorStop(0,"rgba(0,0,0,0)");v.addColorStop(1,"rgba(0,0,0,.4)");ctx.fillStyle=v;ctx.fillRect(0,0,width,height)}
function line(){ctx.strokeStyle=alpha(p.ink,.18);ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(width*.12,height*.56);ctx.lineTo(width*.88,height*.56);ctx.stroke();if(noticeTime>0)text(notice,width/2,height*.28,20,p.accent,"center")}
function stationsDraw(){for(const r of rects){const s=r.station;ctx.fillStyle="rgba(0,0,0,.22)";ctx.beginPath();ctx.roundRect(r.x+2,r.y+4,r.w,r.h,14);ctx.fill();const cg=ctx.createLinearGradient(0,r.y,0,r.y+r.h);cg.addColorStop(0,alpha(s.bottleneck?p.bad:p.ink,.16));cg.addColorStop(1,alpha(s.bottleneck?p.bad:p.ink,.06));ctx.fillStyle=cg;ctx.beginPath();ctx.roundRect(r.x,r.y,r.w,r.h,14);ctx.fill();ctx.strokeStyle=s.bottleneck?p.bad:p.accent;ctx.lineWidth=2.5;ctx.stroke();text(s.name,r.x+r.w/2,r.y+30,20,p.ink,"center");text(S.level+" "+s.level,r.x+r.w/2,r.y+58,14,p.accent,"center");const bx=r.x+22,by=r.y+92,bw=r.w-44;ctx.fillStyle=alpha(p.backgroundA,.55);ctx.beginPath();ctx.roundRect(bx,by,bw,12,6);ctx.fill();const pc=s.bottleneck?p.bad:p.good;ctx.save();ctx.shadowColor=pc;ctx.shadowBlur=10;ctx.fillStyle=pc;ctx.beginPath();ctx.roundRect(bx,by,bw*Math.max(0,Math.min(1,s.progress)),12,6);ctx.fill();ctx.restore();text(s.bottleneck?S.bottleneck:S.upgrade,r.x+r.w/2,r.y+126,13,p.ink,"center")}}
function hud(){if(state===READY)return;text(SPEC.title,20,30,22,p.ink,"left");text(S.score+" "+score+" "+S.best+" "+best,20,58,13,p.ink,"left");text(S.cash+" "+cash,width-20,32,17,p.ink,"right");text(S.time.replace("{n}",Math.ceil(timeLeft)),width-20,60,22,timeLeft<10?p.bad:p.ink,"right")}
function fx(){for(const q of particles){ctx.globalAlpha=q.life*2;ctx.fillStyle=q.color;ctx.fillRect(q.x,q.y,q.size,q.size)}ctx.globalAlpha=1;for(const f of floats){ctx.globalAlpha=f.life;text(f.text,f.x,f.y,16,f.color,"center")}ctx.globalAlpha=1}
function overlay(){ctx.fillStyle="rgba(0,0,0,.66)";ctx.fillRect(0,0,width,height);text(SPEC.title,width/2,height*.43,36,p.ink,"center");text(SPEC.roles.objective,width/2,height*.43+42,15,p.ink,"center");text(state===OVER?S.restart:S.start,width/2,height*.43+94,25,p.accent,"center");if(state===OVER)text(S.score+" "+score+" "+S.best+" "+best,width/2,height*.43+130,15,p.ink,"center")}
function inside(x,y,r){return x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h}function burst(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=35+Math.random()*100;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.5,size:3+Math.random()*5,color:c})}}function addFloat(t,x,y,c){floats.push({text:t,x,y,life:.9,color:c})}function trim(a,pred){for(let i=a.length-1;i>=0;i--)if(pred(a[i]))a.splice(i,1)}function alpha(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}function text(t,x,y,s,c,a){ctx.fillStyle=c;ctx.font=`900 ${s}px system-ui`;ctx.textAlign=a;ctx.textBaseline="middle";ctx.fillText(t,x,y)}
function tick(now){if(!last)last=now;const frame=Math.min(.05,(now-last)/1000);last=now;acc+=frame;while(acc>=FIXED_DT){update(FIXED_DT);acc-=FIXED_DT}render();requestAnimationFrame(tick)}resize();requestAnimationFrame(tick);
})();
</script></body></html>
