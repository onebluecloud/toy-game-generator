<!doctype html>
<html lang="{{LANG}}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>{{TITLE}}</title><link rel="icon" href="data:,"><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:{{BACKGROUND_A}};color:{{INK}};font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;user-select:none}canvas{display:block;width:100vw;height:100vh;touch-action:none}
</style></head><body>
<!--
GAME_SPEC_ID: {{ID}}
GAME_KIT: merge-drop
STYLE_KIT: {{STYLE_KIT}}
MECHANICS: {{MECHANICS}}
ENEMY_SET: {{ENEMY_SET}}
-->
<canvas id="game" aria-label="{{TITLE}}"></canvas><script>
(() => {
"use strict";
const SPEC = {{SPEC_JSON}},S=SPEC.strings,canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),READY="READY",PLAYING="PLAYING",OVER="OVER",FIXED_DT=1/60;
const COLS=5,ROWS=8,p=SPEC.palette,particles=[],floats=[];
let width=0,height=0,dpr=1,state=READY,last=0,acc=0,score=0,best=Number(localStorage.getItem("tgg-"+SPEC.id+"-best")||0),timeLeft=SPEC.duration,combo=0,shake=0,flash=0,hoverCol=-1;
let grid=[],cur=2,nxt=2,faller=null,cell=60,ox=0,oy=0;
function resize(){dpr=Math.max(1,Math.min(2,devicePixelRatio||1));width=innerWidth;height=innerHeight;canvas.width=Math.floor(width*dpr);canvas.height=Math.floor(height*dpr);canvas.style.width=width+"px";canvas.style.height=height+"px";ctx.setTransform(dpr,0,0,dpr,0,0);cell=Math.min(Math.floor(width*.82/COLS),Math.floor(height*.62/ROWS));ox=(width-cell*COLS)/2;oy=height-cell*ROWS-24}
function reset(){state=PLAYING;score=0;timeLeft=SPEC.duration;combo=0;faller=null;particles.length=floats.length=0;grid=[];for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++)grid[r][c]=0}cur=randVal();nxt=randVal()}
function randVal(){return Math.random()<.78?2:4}
function colFromX(x){return Math.max(0,Math.min(COLS-1,Math.floor((x-ox)/cell)))}
function lowestEmpty(c){for(let r=ROWS-1;r>=0;r--)if(grid[r][c]===0)return r;return -1}
function pointerdown(e){e.preventDefault();if(state===READY||state===OVER){reset();return}if(faller)return;const c=colFromX(e.clientX),r=lowestEmpty(c);if(r<0){flash=.18;shake=.1;if(grid[0].every((_,cc)=>lowestEmpty(cc)<0))over();return}faller={col:c,row:r,val:cur,y:oy-cell};cur=nxt;nxt=randVal()}
function pointermove(e){e.preventDefault();hoverCol=colFromX(e.clientX)}
function pointerup(e){e.preventDefault()}
canvas.addEventListener("pointerdown",pointerdown);canvas.addEventListener("pointermove",pointermove);canvas.addEventListener("pointerup",pointerup);canvas.addEventListener("pointercancel",pointerup);addEventListener("resize",resize);
function land(){let r=faller.row,c=faller.col,v=faller.val;grid[r][c]=v;faller=null;let merged=false;while(r+1<ROWS&&grid[r+1][c]===grid[r][c]){v*=2;grid[r+1][c]=v;grid[r][c]=0;r++;score+=Math.round(v*(1+combo*.2)*SPEC.tuning.scoreMultiplier);combo++;merged=true;burst(ox+c*cell+cell/2,oy+r*cell+cell/2,tileColor(v),16);addFloat("+"+v,ox+c*cell+cell/2,oy+r*cell+cell/2-10,p.good)}if(!merged)combo=0;if(grid[0].every((x)=>x!==0)&&grid[0].every((_,cc)=>lowestEmpty(cc)<0))over()}
function update(dt){if(state!==PLAYING){updateFx(dt);return}timeLeft-=dt;if(timeLeft<=0)over();if(faller){faller.y+=1500*dt;const ty=oy+faller.row*cell;if(faller.y>=ty){faller.y=ty;land()}}shake=Math.max(0,shake-dt*3);flash=Math.max(0,flash-dt*3);updateFx(dt)}
function over(){state=OVER;best=Math.max(best,score);localStorage.setItem("tgg-"+SPEC.id+"-best",String(best))}
function updateFx(dt){for(const q of particles){q.x+=q.vx*dt;q.y+=q.vy*dt;q.vy+=120*dt;q.life-=dt}for(const f of floats){f.y-=42*dt;f.life-=dt}trim(particles,q=>q.life<=0);trim(floats,f=>f.life<=0)}
function render(){ctx.save();if(shake)ctx.translate((Math.random()-.5)*shake*16,(Math.random()-.5)*shake*16);bg();well();tiles();drawFaller();fx();hud();if(flash){ctx.fillStyle=alpha(p.bad,flash*.22);ctx.fillRect(0,0,width,height)}if(state!==PLAYING)overlay();ctx.restore()}
function bg(){const g=ctx.createLinearGradient(0,0,0,height);g.addColorStop(0,p.backgroundA);g.addColorStop(1,p.backgroundB);ctx.fillStyle=g;ctx.fillRect(0,0,width,height);const v=ctx.createRadialGradient(width/2,height*.45,height*.2,width/2,height*.5,height*.95);v.addColorStop(0,"rgba(0,0,0,0)");v.addColorStop(1,"rgba(0,0,0,.42)");ctx.fillStyle=v;ctx.fillRect(0,0,width,height)}
function well(){ctx.fillStyle=alpha(p.ink,.07);ctx.beginPath();ctx.roundRect(ox-10,oy-10,cell*COLS+20,cell*ROWS+20,16);ctx.fill();if(state===PLAYING&&hoverCol>=0&&!faller){ctx.fillStyle=alpha(p.accent,.1);ctx.fillRect(ox+hoverCol*cell,oy,cell,cell*ROWS)}for(let c=0;c<=COLS;c++){ctx.strokeStyle=alpha(p.ink,.08);ctx.beginPath();ctx.moveTo(ox+c*cell,oy);ctx.lineTo(ox+c*cell,oy+cell*ROWS);ctx.stroke()}}
function drawTile(cx,cy,v){const s=cell-8,c=tileColor(v);ctx.fillStyle="rgba(0,0,0,.25)";ctx.beginPath();ctx.roundRect(cx-s/2+2,cy-s/2+3,s,s,12);ctx.fill();const g=ctx.createRadialGradient(cx-s*.25,cy-s*.3,s*.1,cx,cy,s*.85);g.addColorStop(0,lighten(c,.5));g.addColorStop(1,c);ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(cx-s/2,cy-s/2,s,s,12);ctx.fill();ctx.strokeStyle=alpha(p.ink,.25);ctx.lineWidth=2;ctx.stroke();text(String(v),cx,cy,v<100?Math.floor(s*.42):v<1000?Math.floor(s*.32):Math.floor(s*.24),p.backgroundA,"center")}
function tiles(){if(grid.length<ROWS)return;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c])drawTile(ox+c*cell+cell/2,oy+r*cell+cell/2,grid[r][c])}
function drawFaller(){if(faller)drawTile(ox+faller.col*cell+cell/2,faller.y+cell/2,faller.val)}
function fx(){for(const q of particles){ctx.globalAlpha=Math.max(0,q.life*2);ctx.fillStyle=q.color;ctx.fillRect(q.x,q.y,q.size,q.size)}ctx.globalAlpha=1;for(const f of floats){ctx.globalAlpha=Math.max(0,f.life);text(f.text,f.x,f.y,16,f.color,"center")}ctx.globalAlpha=1}
function hud(){if(state===READY)return;text(SPEC.title,20,30,21,p.ink,"left");text(S.score+" "+score+"  "+S.best+" "+best,20,58,13,p.ink,"left");text(S.time.replace("{n}",Math.ceil(timeLeft)),width-20,32,22,timeLeft<10?p.bad:p.ink,"right");if(state===PLAYING)text("▼ "+cur+"   "+nxt,width-20,60,14,p.accent,"right")}
function overlay(){ctx.fillStyle="rgba(0,0,0,.66)";ctx.fillRect(0,0,width,height);text(SPEC.title,width/2,height*.4,34,p.ink,"center");text(SPEC.roles.objective,width/2,height*.4+40,15,p.ink,"center");text(state===OVER?S.restart:S.start,width/2,height*.4+92,24,p.accent,"center");if(state===OVER)text(S.score+" "+score+"  "+S.best+" "+best,width/2,height*.4+128,15,p.ink,"center")}
function tileColor(v){const i=Math.max(0,Math.round(Math.log2(v))-1);return [p.good,p.accent,p.bad,"#60a5fa","#f59e0b","#a78bfa","#34d399",p.ink][i%8]}
function burst(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=40+Math.random()*120;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.5,size:3+Math.random()*5,color:c})}}
function addFloat(t,x,y,c){floats.push({text:t,x,y,life:.9,color:c})}
function trim(a,pred){for(let i=a.length-1;i>=0;i--)if(pred(a[i]))a.splice(i,1)}
function alpha(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}
function lighten(hex,t){const n=parseInt(hex.slice(1),16),r=n>>16&255,g=n>>8&255,b=n&255,m=v=>Math.round(v+(255-v)*t);return`rgb(${m(r)},${m(g)},${m(b)})`}
function text(t,x,y,s,c,a){ctx.fillStyle=c;ctx.font=`900 ${s}px system-ui`;ctx.textAlign=a;ctx.textBaseline="middle";ctx.fillText(t,x,y)}
function tick(now){if(!last)last=now;const frame=Math.min(.05,(now-last)/1000);last=now;acc+=frame;while(acc>=FIXED_DT){update(FIXED_DT);acc-=FIXED_DT}render();requestAnimationFrame(tick)}
resize();requestAnimationFrame(tick);
})();
</script></body></html>
