<!doctype html>
<html lang="{{LANG}}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>{{TITLE}}</title><link rel="icon" href="data:,"><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:{{BACKGROUND_A}};color:{{INK}};font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;user-select:none}canvas{display:block;width:100vw;height:100vh;touch-action:none}
</style></head><body>
<!--
GAME_SPEC_ID: {{ID}}
GAME_KIT: match-puzzle
STYLE_KIT: {{STYLE_KIT}}
MECHANICS: {{MECHANICS}}
ENEMY_SET: {{ENEMY_SET}}
-->
<canvas id="game" aria-label="{{TITLE}}"></canvas><script>
(() => {
"use strict";
const SPEC = {{SPEC_JSON}},S=SPEC.strings,canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),READY="READY",PLAYING="PLAYING",OVER="OVER",FIXED_DT=1/60;
let width=0,height=0,dpr=1,state=READY,last=0,acc=0,score=0,best=Number(localStorage.getItem("tgg-"+SPEC.id+"-best")||0),timeLeft=SPEC.duration,combo=0,shake=0,flash=0;
const p=SPEC.palette,N=7,board=[],particles=[],floats=[],colors=[];
let ox=0,oy=0,tile=54;
function initColors(){colors.length=0;colors.push(p.good,p.accent,p.bad,p.ink,"#60a5fa")}
function resize(){dpr=Math.max(1,Math.min(2,devicePixelRatio||1));width=innerWidth;height=innerHeight;canvas.width=Math.floor(width*dpr);canvas.height=Math.floor(height*dpr);canvas.style.width=width+"px";canvas.style.height=height+"px";ctx.setTransform(dpr,0,0,dpr,0,0);tile=Math.min(62,Math.floor(Math.min(width*.72,height*.72)/N));ox=(width-tile*N)/2;oy=(height-tile*N)/2+24}
function reset(){state=PLAYING;score=0;timeLeft=SPEC.duration;combo=0;particles.length=floats.length=0;initColors();board.length=0;for(let y=0;y<N;y++){board[y]=[];for(let x=0;x<N;x++)board[y][x]=randTile()}}
function randTile(){return Math.floor(Math.random()*colors.length)}
function pointerdown(e){e.preventDefault();if(state===READY||state===OVER){reset();return}const x=Math.floor((e.clientX-ox)/tile),y=Math.floor((e.clientY-oy)/tile);if(x<0||x>=N||y<0||y>=N)return;const group=findGroup(x,y);if(group.length<2){combo=0;shake=.12;flash=.18;return}clearGroup(group)}
function pointermove(e){e.preventDefault()}function pointerup(e){e.preventDefault()}
canvas.addEventListener("pointerdown",pointerdown);canvas.addEventListener("pointermove",pointermove);canvas.addEventListener("pointerup",pointerup);canvas.addEventListener("pointercancel",pointerup);addEventListener("resize",resize);
function findGroup(sx,sy){const type=board[sy][sx],seen=new Set(),out=[],stack=[[sx,sy]];while(stack.length){const [x,y]=stack.pop(),k=x+","+y;if(seen.has(k)||x<0||x>=N||y<0||y>=N||board[y][x]!==type)continue;seen.add(k);out.push([x,y]);stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1])}return out}
function clearGroup(group){combo++;const points=Math.round(group.length*group.length*(1+combo*.25)*SPEC.tuning.scoreMultiplier);score+=points;addFloat("+"+points,ox+group[0][0]*tile+tile/2,oy+group[0][1]*tile,p.good);for(const [x,y] of group){burst(ox+x*tile+tile/2,oy+y*tile+tile/2,colors[board[y][x]],8);board[y][x]=null}collapse()}
function collapse(){for(let x=0;x<N;x++){let col=[];for(let y=N-1;y>=0;y--)if(board[y][x]!==null)col.push(board[y][x]);while(col.length<N)col.push(randTile());for(let y=N-1;y>=0;y--)board[y][x]=col[N-1-y]}}
function update(dt){if(state!==PLAYING){updateFx(dt);return}timeLeft-=dt;if(timeLeft<=0)over();shake=Math.max(0,shake-dt*3);flash=Math.max(0,flash-dt*3);updateFx(dt)}
function over(){state=OVER;best=Math.max(best,score);localStorage.setItem("tgg-"+SPEC.id+"-best",String(best))}
function updateFx(dt){for(const q of particles){q.x+=q.vx*dt;q.y+=q.vy*dt;q.life-=dt}for(const f of floats){f.y-=40*dt;f.life-=dt}trim(particles,q=>q.life<=0);trim(floats,f=>f.life<=0)}
function render(){ctx.save();if(shake)ctx.translate((Math.random()-.5)*shake*18,(Math.random()-.5)*shake*18);bg();drawBoard();fx();hud();if(flash){ctx.fillStyle=alpha(p.bad,flash*.22);ctx.fillRect(0,0,width,height)}if(state!==PLAYING)overlay();ctx.restore()}
function bg(){const g=ctx.createLinearGradient(0,0,0,height);g.addColorStop(0,p.backgroundA);g.addColorStop(1,p.backgroundB);ctx.fillStyle=g;ctx.fillRect(0,0,width,height);const v=ctx.createRadialGradient(width/2,height*.45,height*.2,width/2,height*.5,height*.95);v.addColorStop(0,"rgba(0,0,0,0)");v.addColorStop(1,"rgba(0,0,0,.4)");ctx.fillStyle=v;ctx.fillRect(0,0,width,height)}
function drawBoard(){if(board.length<N||colors.length===0)return;ctx.fillStyle=alpha(p.ink,.08);ctx.beginPath();ctx.roundRect(ox-12,oy-12,tile*N+24,tile*N+24,18);ctx.fill();for(let y=0;y<N;y++)for(let x=0;x<N;x++){const val=board[y][x];if(val==null)continue;const c=colors[val],cx=ox+x*tile+tile/2,cy=oy+y*tile+tile/2,s=tile-10;ctx.fillStyle="rgba(0,0,0,.22)";ctx.beginPath();ctx.roundRect(cx-s/2+2,cy-s/2+3,s,s,12);ctx.fill();const g=ctx.createRadialGradient(cx-s*.25,cy-s*.3,s*.1,cx,cy,s*.85);g.addColorStop(0,lighten(c,.55));g.addColorStop(1,c);ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(cx-s/2,cy-s/2,s,s,12);ctx.fill();ctx.strokeStyle=alpha(p.ink,.22);ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle="rgba(255,255,255,.42)";ctx.beginPath();ctx.ellipse(cx-s*.16,cy-s*.2,s*.2,s*.12,-.5,0,Math.PI*2);ctx.fill()}}
function hud(){if(state===READY)return;text(SPEC.title,20,30,22,p.ink,"left");text(S.score+" "+score+" "+S.best+" "+best,20,58,13,p.ink,"left");text(S.combo+" "+combo,width-20,32,15,p.ink,"right");text(S.time.replace("{n}",Math.ceil(timeLeft)),width-20,60,22,timeLeft<10?p.bad:p.ink,"right")}
function fx(){for(const q of particles){ctx.globalAlpha=q.life*2;ctx.fillStyle=q.color;ctx.fillRect(q.x,q.y,q.size,q.size)}ctx.globalAlpha=1;for(const f of floats){ctx.globalAlpha=f.life;text(f.text,f.x,f.y,16,f.color,"center")}ctx.globalAlpha=1}
function overlay(){ctx.fillStyle="rgba(0,0,0,.66)";ctx.fillRect(0,0,width,height);text(SPEC.title,width/2,height*.43,36,p.ink,"center");text(SPEC.roles.objective,width/2,height*.43+42,15,p.ink,"center");text(state===OVER?S.restart:S.start,width/2,height*.43+94,25,p.accent,"center");if(state===OVER)text(S.score+" "+score+" "+S.best+" "+best,width/2,height*.43+130,15,p.ink,"center")}
function burst(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=40+Math.random()*120;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.5,size:3+Math.random()*5,color:c})}}function addFloat(t,x,y,c){floats.push({text:t,x,y,life:.9,color:c})}function trim(a,pred){for(let i=a.length-1;i>=0;i--)if(pred(a[i]))a.splice(i,1)}function alpha(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}function lighten(hex,t){const n=parseInt(hex.slice(1),16),r=n>>16&255,g=n>>8&255,b=n&255,m=v=>Math.round(v+(255-v)*t);return`rgb(${m(r)},${m(g)},${m(b)})`}function text(t,x,y,s,c,a){ctx.fillStyle=c;ctx.font=`900 ${s}px system-ui`;ctx.textAlign=a;ctx.textBaseline="middle";ctx.fillText(t,x,y)}
function tick(now){if(!last)last=now;const frame=Math.min(.05,(now-last)/1000);last=now;acc+=frame;while(acc>=FIXED_DT){update(FIXED_DT);acc-=FIXED_DT}render();requestAnimationFrame(tick)}
resize();requestAnimationFrame(tick);
})();
</script></body></html>
