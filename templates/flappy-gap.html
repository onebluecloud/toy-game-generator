<!doctype html>
<html lang="{{LANG}}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>{{TITLE}}</title><link rel="icon" href="data:,"><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:{{BACKGROUND_A}};color:{{INK}};font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;user-select:none}canvas{display:block;width:100vw;height:100vh;touch-action:none}
</style></head><body>
<!--
GAME_SPEC_ID: {{ID}}
GAME_KIT: flappy-gap
STYLE_KIT: {{STYLE_KIT}}
MECHANICS: {{MECHANICS}}
ENEMY_SET: {{ENEMY_SET}}
-->
<canvas id="game" aria-label="{{TITLE}}"></canvas><script>
(() => {
"use strict";
const SPEC = {{SPEC_JSON}},S=SPEC.strings,canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),READY="READY",PLAYING="PLAYING",OVER="OVER",FIXED_DT=1/60;
const p=SPEC.palette,particles=[],floats=[],pipes=[];
let width=0,height=0,dpr=1,state=READY,last=0,acc=0,score=0,best=Number(localStorage.getItem("tgg-"+SPEC.id+"-best")||0),timeLeft=SPEC.duration,shake=0,flash=0,scroll=0;
const bird={x:0,y:0,vy:0,r:18};let speed=160,spawnTimer=0,gap=0,pw=64;
function resize(){dpr=Math.max(1,Math.min(2,devicePixelRatio||1));width=innerWidth;height=innerHeight;canvas.width=Math.floor(width*dpr);canvas.height=Math.floor(height*dpr);canvas.style.width=width+"px";canvas.style.height=height+"px";ctx.setTransform(dpr,0,0,dpr,0,0);bird.x=width*.3;gap=Math.max(150,height*.3);pw=Math.max(56,width*.09);if(state!==PLAYING)bird.y=height*.45}
function reset(){state=PLAYING;score=0;timeLeft=SPEC.duration;speed=160*SPEC.tuning.speed;bird.y=height*.45;bird.vy=0;pipes.length=particles.length=floats.length=0;spawnTimer=.3;scroll=0}
function flap(){bird.vy=-360}
function pointerdown(e){e.preventDefault();if(state===READY||state===OVER){reset();return}flap()}
function pointermove(e){e.preventDefault()}function pointerup(e){e.preventDefault()}
canvas.addEventListener("pointerdown",pointerdown);canvas.addEventListener("pointermove",pointermove);canvas.addEventListener("pointerup",pointerup);canvas.addEventListener("pointercancel",pointerup);addEventListener("resize",resize);
function spawn(){const m=90,gy=m+Math.random()*(height-gap-m*2-60);pipes.push({x:width+pw,gy,scored:false})}
function update(dt){if(state!==PLAYING){updateFx(dt);return}timeLeft-=dt;if(timeLeft<=0)over();speed+=dt*3;scroll+=speed*dt;bird.vy+=1250*dt;bird.y+=bird.vy*dt;spawnTimer-=dt;if(spawnTimer<=0){spawn();spawnTimer=Math.max(.9,(gap+pw+170)/speed)}for(const pi of pipes){pi.x-=speed*dt;if(!pi.scored&&pi.x+pw<bird.x){pi.scored=true;score+=1;addFloat("+1",bird.x,bird.y-30,p.good);burst(bird.x,bird.y,p.accent,8)}if(bird.x+bird.r>pi.x&&bird.x-bird.r<pi.x+pw&&(bird.y-bird.r<pi.gy||bird.y+bird.r>pi.gy+gap))crash()}trim(pipes,pi=>pi.x<-pw-10);if(bird.y+bird.r>height-30||bird.y-bird.r<0)crash();shake=Math.max(0,shake-dt*3);flash=Math.max(0,flash-dt*3);updateFx(dt)}
function crash(){if(state!==PLAYING)return;shake=.4;flash=.5;burst(bird.x,bird.y,p.bad,24);over()}
function over(){state=OVER;best=Math.max(best,score);localStorage.setItem("tgg-"+SPEC.id+"-best",String(best))}
function updateFx(dt){for(const q of particles){q.x+=q.vx*dt;q.y+=q.vy*dt;q.vy+=200*dt;q.life-=dt}for(const f of floats){f.y-=42*dt;f.life-=dt}trim(particles,q=>q.life<=0);trim(floats,f=>f.life<=0)}
function render(){ctx.save();if(shake)ctx.translate((Math.random()-.5)*shake*16,(Math.random()-.5)*shake*16);bg();drawPipes();ground();drawBird();fx();hud();if(flash){ctx.fillStyle=alpha(p.bad,flash*.22);ctx.fillRect(0,0,width,height)}if(state!==PLAYING)overlay();ctx.restore()}
function bg(){const g=ctx.createLinearGradient(0,0,0,height);g.addColorStop(0,p.backgroundA);g.addColorStop(1,p.backgroundB);ctx.fillStyle=g;ctx.fillRect(0,0,width,height);ctx.fillStyle=alpha(p.ink,.05);for(let i=0;i<5;i++){const x=((i*260-scroll*.3)%(width+260)+width+260)%(width+260)-130;ctx.beginPath();ctx.arc(x,height*.3+((i*53)%80),46,0,Math.PI*2);ctx.fill()}const v=ctx.createRadialGradient(width/2,height*.45,height*.2,width/2,height*.5,height*.95);v.addColorStop(0,"rgba(0,0,0,0)");v.addColorStop(1,"rgba(0,0,0,.4)");ctx.fillStyle=v;ctx.fillRect(0,0,width,height)}
function pipe(x,y,h,cap){const g=ctx.createLinearGradient(x,0,x+pw,0);g.addColorStop(0,p.good);g.addColorStop(.5,lighten(p.good,.4));g.addColorStop(1,p.good);ctx.save();ctx.shadowColor=p.good;ctx.shadowBlur=12;ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(x,y,pw,h,6);ctx.fill();ctx.beginPath();ctx.roundRect(x-6,cap,pw+12,18,6);ctx.fill();ctx.restore();ctx.strokeStyle=alpha(p.ink,.3);ctx.lineWidth=2;ctx.stroke()}
function drawPipes(){for(const pi of pipes){pipe(pi.x,0,pi.gy,pi.gy-18);pipe(pi.x,pi.gy+gap,height-(pi.gy+gap),pi.gy+gap)}}
function ground(){ctx.fillStyle=alpha(p.ink,.18);ctx.fillRect(0,height-30,width,30);ctx.fillStyle=alpha(p.ink,.3);for(let i=0;i<width/28+1;i++){const x=((i*28-scroll)%(width+28)+width+28)%(width+28)-28;ctx.fillRect(x,height-30,14,30)}}
function drawBird(){const ang=Math.max(-.5,Math.min(1.1,bird.vy/520));ctx.save();ctx.translate(bird.x,bird.y);ctx.rotate(ang);ctx.fillStyle="rgba(0,0,0,.25)";ctx.beginPath();ctx.ellipse(0,bird.r*.9,bird.r,bird.r*.45,0,0,Math.PI*2);ctx.fill();const g=ctx.createRadialGradient(-bird.r*.3,-bird.r*.3,3,0,0,bird.r);g.addColorStop(0,lighten(p.accent,.5));g.addColorStop(1,p.accent);ctx.shadowColor=p.accent;ctx.shadowBlur=14;ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,bird.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle=p.ink;ctx.lineWidth=2.5;ctx.stroke();ctx.fillStyle="#f59e0b";ctx.beginPath();ctx.moveTo(bird.r*.7,-2);ctx.lineTo(bird.r*1.4,2);ctx.lineTo(bird.r*.7,6);ctx.closePath();ctx.fill();ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(bird.r*.25,-bird.r*.25,bird.r*.32,0,Math.PI*2);ctx.fill();ctx.fillStyle="#10131a";ctx.beginPath();ctx.arc(bird.r*.34,-bird.r*.25,bird.r*.15,0,Math.PI*2);ctx.fill();ctx.restore()}
function fx(){for(const q of particles){ctx.globalAlpha=Math.max(0,q.life*2);ctx.fillStyle=q.color;ctx.fillRect(q.x,q.y,q.size,q.size)}ctx.globalAlpha=1;for(const f of floats){ctx.globalAlpha=Math.max(0,f.life);text(f.text,f.x,f.y,18,f.color,"center")}ctx.globalAlpha=1}
function hud(){if(state===READY)return;text(SPEC.title,20,30,21,p.ink,"left");text(S.best+" "+best,20,58,13,p.ink,"left");text(String(score),width/2,80,46,p.ink,"center");text(S.time.replace("{n}",Math.ceil(timeLeft)),width-20,32,20,timeLeft<10?p.bad:p.ink,"right")}
function overlay(){ctx.fillStyle="rgba(0,0,0,.6)";ctx.fillRect(0,0,width,height);text(SPEC.title,width/2,height*.38,34,p.ink,"center");text(SPEC.roles.objective,width/2,height*.38+40,15,p.ink,"center");text(state===OVER?S.restart:S.start,width/2,height*.38+92,24,p.accent,"center");if(state===OVER)text(S.score+" "+score+"  "+S.best+" "+best,width/2,height*.38+128,15,p.ink,"center")}
function burst(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=40+Math.random()*130;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.5,size:3+Math.random()*5,color:c})}}
function addFloat(t,x,y,c){floats.push({text:t,x,y,life:.8,color:c})}
function trim(a,pred){for(let i=a.length-1;i>=0;i--)if(pred(a[i]))a.splice(i,1)}
function alpha(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}
function lighten(hex,t){const n=parseInt(hex.slice(1),16),r=n>>16&255,g=n>>8&255,b=n&255,m=v=>Math.round(v+(255-v)*t);return`rgb(${m(r)},${m(g)},${m(b)})`}
function text(t,x,y,s,c,a){ctx.fillStyle=c;ctx.font=`900 ${s}px system-ui`;ctx.textAlign=a;ctx.textBaseline="middle";ctx.fillText(t,x,y)}
function tick(now){if(!last)last=now;const frame=Math.min(.05,(now-last)/1000);last=now;acc+=frame;while(acc>=FIXED_DT){update(FIXED_DT);acc-=FIXED_DT}render();requestAnimationFrame(tick)}
resize();requestAnimationFrame(tick);
})();
</script></body></html>
