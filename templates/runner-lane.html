<!doctype html>
<html lang="{{LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{{TITLE}}</title>
<link rel="icon" href="data:,">
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:{{BACKGROUND_A}};color:{{INK}};font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;user-select:none}
canvas{display:block;width:100vw;height:100vh;touch-action:none}
</style>
</head>
<body>
<!--
GAME_SPEC_ID: {{ID}}
GAME_KIT: runner-lane
STYLE_KIT: {{STYLE_KIT}}
MECHANICS: {{MECHANICS}}
ENEMY_SET: {{ENEMY_SET}}
-->
<canvas id="game" aria-label="{{TITLE}}"></canvas>
<script>
(() => {
  "use strict";
  const SPEC = {{SPEC_JSON}};
  const S = SPEC.strings;
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const STATE_READY = "READY", STATE_PLAYING = "PLAYING", STATE_OVER = "OVER", FIXED_DT = 1 / 60;
  const palette = SPEC.palette, MAXSPD = 640, NITROSPD = 880;
  let width = 0, height = 0, dpr = 1, state = STATE_READY, last = 0, acc = 0;
  let score = 0, best = Number(localStorage.getItem("tgg-" + SPEC.id + "-best") || 0), timeLeft = SPEC.duration;
  let speed = 0, travel = 0, roadT = 0, curve = 0, curveT = 0, playerX = 0, targetX = 0, hp = 3, combo = 0, comboT = 0, nitro = 0, shake = 0, flash = 0, dist = 0, inv = 0;
  let spawnTimer = 0, poleTimer = 0, pickTimer = 0;
  const rivals = [], coins = [], boosts = [], poles = [], particles = [], floats = [];
  const RIVAL_COLORS = [palette.bad, palette.good, "#f59e0b", "#a78bfa", "#60a5fa"];
  function HOR() { return height * 0.42; }
  function carW() { return Math.max(46, Math.min(96, width * 0.13)); }
  function roadCenter(p) { return width / 2 + curve * Math.pow(1 - p, 2) * width * 0.95; }
  function roadHalf(p) { return width * 0.05 + p * width * 0.42; }
  function projX(z, x) { return roadCenter(z) + x * roadHalf(z) * 0.86; }
  function projY(z) { return HOR() + z * (height - HOR()); }

  function resize() {
    dpr = Math.max(1, Math.min(2, devicePixelRatio || 1));
    width = innerWidth; height = innerHeight;
    canvas.width = Math.floor(width * dpr); canvas.height = Math.floor(height * dpr);
    canvas.style.width = width + "px"; canvas.style.height = height + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (state !== STATE_PLAYING) { playerX = width / 2; targetX = width / 2; }
  }
  function reset() {
    state = STATE_PLAYING; score = 0; timeLeft = SPEC.duration; speed = 300; travel = 0; roadT = 0; curve = 0; curveT = 0;
    playerX = width / 2; targetX = width / 2; hp = 3; combo = 0; comboT = 0; nitro = 0; dist = 0;
    rivals.length = coins.length = boosts.length = poles.length = particles.length = floats.length = 0;
    spawnTimer = 1.3; poleTimer = 0; pickTimer = 1.2; inv = 1;
  }
  function down(e) { e.preventDefault(); if (state === STATE_READY || state === STATE_OVER) { reset(); return; } targetX = e.clientX; }
  function move(e) { e.preventDefault(); if (state === STATE_PLAYING) targetX = e.clientX; }
  canvas.addEventListener("pointerdown", down); canvas.addEventListener("pointermove", move);
  canvas.addEventListener("pointerup", e => e.preventDefault()); canvas.addEventListener("pointercancel", e => e.preventDefault());
  addEventListener("resize", resize);

  function update(dt) {
    if (state !== STATE_PLAYING) { updateFx(dt); return; }
    timeLeft -= dt; if (timeLeft <= 0 || hp <= 0) return over();
    const tgt = nitro > 0 ? NITROSPD : MAXSPD;
    speed += (tgt - speed) * Math.min(1, dt * 0.5);
    nitro = Math.max(0, nitro - dt); inv = Math.max(0, inv - dt);
    const rate = speed / MAXSPD;
    travel += rate * dt * 0.7; dist += speed * dt * 0.01;
    roadT += rate * dt * 0.9; curveT = Math.sin(roadT) * 0.7 + Math.sin(roadT * 0.37) * 0.25;
    curve += (curveT - curve) * Math.min(1, dt * 1.6);
    playerX += (targetX - playerX) * Math.min(1, dt * 9);
    playerX += curve * speed * dt * 0.85;
    playerX = clamp(playerX, carW() * 0.4, width - carW() * 0.4);
    comboT = Math.max(0, comboT - dt); if (!comboT) combo = 0;
    const cc = roadCenter(0.86), ch = roadHalf(0.86);
    if (Math.abs(playerX - cc) > ch * 0.92) { speed *= 0.975; if (Math.random() < 0.5) particles.push({ x: playerX + (Math.random() - .5) * 40, y: height * 0.86, vx: (Math.random() - .5) * 60, vy: -40 - Math.random() * 60, life: .5, size: 3 + Math.random() * 4, color: "#caa86a" }); shake = Math.max(shake, .08); }
    spawnTimer -= dt; if (spawnTimer <= 0) { spawnRival(); spawnTimer = Math.max(0.45, 1.15 - rate * 0.6); }
    poleTimer -= dt; if (poleTimer <= 0) { poles.push({ z: 0.02, side: Math.random() < .5 ? -1 : 1 }); poleTimer = 0.22; }
    pickTimer -= dt; if (pickTimer <= 0) { if (Math.random() < 0.3) boosts.push({ z: 0.02, x: rnd(-0.6, 0.6) }); else coins.push({ z: 0.02, x: rnd(-0.6, 0.6) }); pickTimer = rnd(0.7, 1.5); }
    const wr = rate * dt * 0.62;
    for (const r of rivals) { r.z += wr * (0.4 + r.sf * 0.32); if (r.z > 0.86 && !r.done) resolveRival(r); }
    for (const c of coins) { c.z += wr; if (c.z > 0.82 && c.z < 1 && !c.done && Math.abs(projX(c.z, c.x) - playerX) < carW() * 0.85) { c.done = true; const g = Math.round(10 * (1 + combo * 0.2) * SPEC.tuning.scoreMultiplier); score += g; addFloat("+" + g, playerX, height * 0.7, palette.good); burst(projX(c.z, c.x), projY(c.z), "#f59e0b", 10); } }
    for (const b of boosts) { b.z += wr; if (b.z > 0.82 && b.z < 1 && !b.done && Math.abs(projX(b.z, b.x) - playerX) < carW() * 0.9) { b.done = true; nitro = 2.4; score += 20; addFloat(S.nitro || "NITRO", playerX, height * 0.66, palette.accent); burst(playerX, height * 0.84, palette.accent, 22); } }
    for (const p of poles) p.z += wr;
    trim(rivals, r => r.z > 1.25); trim(coins, c => c.z > 1.2 || c.done); trim(boosts, b => b.z > 1.2 || b.done); trim(poles, p => p.z > 1.15);
    shake = Math.max(0, shake - dt * 3); flash = Math.max(0, flash - dt * 3);
    updateFx(dt);
  }
  function spawnRival() { rivals.push({ z: 0.02, x: rnd(-0.62, 0.62), color: RIVAL_COLORS[Math.floor(Math.random() * RIVAL_COLORS.length)], sf: Math.random(), done: false }); }
  function resolveRival(r) {
    r.done = true;
    const rx = projX(r.z, r.x), gap = Math.abs(rx - playerX), w = carW();
    if (gap < w * 0.78 && inv <= 0) { hp--; inv = 1.2; speed *= 0.5; shake = .4; flash = .5; combo = 0; burst(playerX, height * 0.84, palette.bad, 24); addFloat("-1", playerX, height * 0.7, palette.bad); if (hp <= 0) over(); }
    else if (gap < w * 0.78) { /* shielded during grace */ }
    else { let g = 15; if (gap < w * 1.25) { combo++; comboT = 2.2; g += 15 * combo; addFloat((S.near || "NEAR") + " x" + combo, rx, projY(r.z) - 10, palette.accent); } else addFloat("+15", rx, projY(r.z) - 10, palette.ink); score += Math.round(g * SPEC.tuning.scoreMultiplier); }
  }
  function over() { state = STATE_OVER; best = Math.max(best, score); localStorage.setItem("tgg-" + SPEC.id + "-best", String(best)); }
  function updateFx(dt) { for (const q of particles) { q.x += q.vx * dt; q.y += q.vy * dt; q.vy += 120 * dt; q.life -= dt; } for (const f of floats) { f.y -= 38 * dt; f.life -= dt; } trim(particles, q => q.life <= 0); trim(floats, f => f.life <= 0); }

  function render() {
    ctx.save();
    if (shake) ctx.translate((Math.random() - .5) * shake * 16, (Math.random() - .5) * shake * 16);
    sky(); road(); scenery(); pickupsDraw(); rivalsDraw(); car(); speedLines(); fx(); hud();
    if (flash) { ctx.fillStyle = alpha(palette.bad, flash * .2); ctx.fillRect(0, 0, width, height); }
    if (state !== STATE_PLAYING) overlay();
    ctx.restore();
  }
  function sky() {
    const h = HOR(), g = ctx.createLinearGradient(0, 0, 0, h); g.addColorStop(0, palette.backgroundA); g.addColorStop(1, lighten(palette.backgroundB, .12));
    ctx.fillStyle = g; ctx.fillRect(0, 0, width, h);
    ctx.fillStyle = alpha(palette.accent, .18); ctx.beginPath(); ctx.arc(width / 2 - curve * width * 0.5, h - 24, 46, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = lighten(palette.backgroundB, .04); for (let i = 0; i < 7; i++) { const x = ((i * 220 - travel * 30) % (width + 220) + width + 220) % (width + 220) - 110; ctx.beginPath(); ctx.ellipse(x, h - 8, 90, 26, 0, Math.PI, 0); ctx.fill(); }
  }
  function road() {
    const h = HOR();
    for (let y = h; y < height; y += 3) {
      const p = (y - h) / (height - h), cen = roadCenter(p), half = roadHalf(p);
      const seg = Math.floor((1 / (p + 0.05)) * 1.5 - travel * 9) & 1;
      ctx.fillStyle = seg ? lighten(palette.good, .02) : "#3a7d44"; ctx.fillRect(0, y, width, 3);
      ctx.fillStyle = seg ? "#3a3f4b" : "#2c313c"; ctx.fillRect(cen - half, y, half * 2, 3);
      const cw = Math.max(3, half * 0.08); ctx.fillStyle = seg ? "#e7e9ee" : palette.bad;
      ctx.fillRect(cen - half, y, cw, 3); ctx.fillRect(cen + half - cw, y, cw, 3);
      if (seg && p > 0.18) { ctx.fillStyle = "rgba(255,255,255,.85)"; ctx.fillRect(cen - half * 0.02, y, Math.max(2, half * 0.04), 3); }
    }
  }
  function scenery() {
    for (const pl of poles.slice().sort((a, b) => a.z - b.z)) {
      const x = roadCenter(pl.z) + pl.side * roadHalf(pl.z) * 1.18, y = projY(pl.z), s = pl.z;
      ctx.fillStyle = alpha("#10131a", .25); ctx.fillRect(x - 2 * s, y - 70 * s, 4 * s, 70 * s);
      const g = ctx.createRadialGradient(x, y - 64 * s, 2, x, y - 64 * s, 16 * s); g.addColorStop(0, lighten(palette.good, .5)); g.addColorStop(1, palette.good);
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y - 64 * s, Math.max(3, 14 * s), 0, Math.PI * 2); ctx.fill();
    }
  }
  function pickupsDraw() {
    for (const c of coins) { if (c.done) continue; const x = projX(c.z, c.x), y = projY(c.z), s = Math.max(.2, c.z); ctx.save(); ctx.shadowColor = "#f59e0b"; ctx.shadowBlur = 10; ctx.fillStyle = "#f59e0b"; ctx.beginPath(); ctx.ellipse(x, y, 13 * s, 16 * s, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
    for (const b of boosts) { if (b.done) continue; const x = projX(b.z, b.x), y = projY(b.z), s = Math.max(.2, b.z); ctx.save(); ctx.shadowColor = palette.accent; ctx.shadowBlur = 14; ctx.fillStyle = palette.accent; ctx.beginPath(); ctx.moveTo(x, y - 18 * s); ctx.lineTo(x + 11 * s, y + 4 * s); ctx.lineTo(x - 3 * s, y + 4 * s); ctx.lineTo(x + 5 * s, y + 20 * s); ctx.lineTo(x - 11 * s, y - 4 * s); ctx.lineTo(x + 3 * s, y - 4 * s); ctx.closePath(); ctx.fill(); ctx.restore(); }
  }
  function carShape(cx, cy, w, h, col, tilt) {
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(tilt);
    ctx.fillStyle = "rgba(0,0,0,.3)"; ctx.beginPath(); ctx.ellipse(0, h * 0.46, w * 0.6, h * 0.16, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#1b2230"; for (const sx of [-1, 1]) { ctx.beginPath(); ctx.roundRect(sx * w * 0.42 - w * 0.1, -h * 0.34, w * 0.2, h * 0.34, 4); ctx.fill(); ctx.beginPath(); ctx.roundRect(sx * w * 0.42 - w * 0.1, h * 0.06, w * 0.2, h * 0.34, 4); ctx.fill(); }
    const g = ctx.createLinearGradient(-w / 2, 0, w / 2, 0); g.addColorStop(0, col); g.addColorStop(.5, lighten(col, .4)); g.addColorStop(1, col);
    ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(-w * 0.36, -h / 2, w * 0.72, h, w * 0.18); ctx.fill();
    ctx.strokeStyle = palette.ink; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = alpha(palette.backgroundA, .85); ctx.beginPath(); ctx.roundRect(-w * 0.24, -h * 0.3, w * 0.48, h * 0.26, 5); ctx.fill(); ctx.beginPath(); ctx.roundRect(-w * 0.24, h * 0.08, w * 0.48, h * 0.2, 5); ctx.fill();
    ctx.restore();
  }
  function rivalsDraw() {
    for (const r of rivals.slice().sort((a, b) => a.z - b.z)) { const x = projX(r.z, r.x), y = projY(r.z), s = Math.max(.18, r.z); carShape(x, y, carW() * s, carW() * 1.4 * s, r.color, curve * 0.3); }
  }
  function car() {
    const cy = height * 0.86, steer = clamp((targetX - playerX) * 0.006 + curve * 0.5, -0.4, 0.4);
    if (nitro > 0) for (let i = 0; i < 2; i++) particles.push({ x: playerX + (Math.random() - .5) * carW() * 0.5, y: cy + carW() * 0.7, vx: (Math.random() - .5) * 50, vy: 120 + Math.random() * 120, life: .4, size: 4 + Math.random() * 5, color: i ? palette.accent : "#f59e0b" });
    const blink = inv > 0 && Math.floor(inv * 12) % 2 === 0;
    if (blink) ctx.globalAlpha = 0.4;
    if (nitro > 0) { ctx.save(); ctx.shadowColor = palette.accent; ctx.shadowBlur = 26; }
    carShape(playerX, cy, carW(), carW() * 1.45, palette.accent, steer);
    if (nitro > 0) ctx.restore();
    ctx.globalAlpha = 1;
  }
  function speedLines() {
    const n = nitro > 0 ? 22 : Math.floor((speed / MAXSPD) * 8);
    ctx.strokeStyle = alpha(palette.ink, nitro > 0 ? .35 : .14); ctx.lineWidth = 2;
    for (let i = 0; i < n; i++) { const x = (i * 97.3 % width), len = 30 + (i % 5) * 24; ctx.beginPath(); ctx.moveTo(x, ((i * 53 + travel * 600) % height)); ctx.lineTo(x, ((i * 53 + travel * 600) % height) + len); ctx.stroke(); }
  }
  function fx() { for (const q of particles) { ctx.globalAlpha = Math.max(0, q.life * 2); ctx.fillStyle = q.color; ctx.fillRect(q.x - q.size / 2, q.y - q.size / 2, q.size, q.size); } ctx.globalAlpha = 1; for (const f of floats) { ctx.globalAlpha = Math.max(0, f.life); text(f.text, f.x, f.y, 16, f.color, "center"); } ctx.globalAlpha = 1; }
  function hud() {
    if (state === STATE_READY) return;
    text(SPEC.title, 18, 30, 21, palette.ink, "left");
    text(S.score + " " + score + "  " + S.best + " " + best, 18, 58, 13, palette.ink, "left");
    text(S.time.replace("{n}", Math.ceil(timeLeft)), width - 18, 32, 22, timeLeft < 10 ? palette.bad : palette.ink, "right");
    text(S.hp + " " + hp + (combo > 1 ? "  x" + combo : ""), width - 18, 60, 14, palette.ink, "right");
    const bx = 18, by = height - 26, bw = Math.min(160, width * 0.34);
    ctx.fillStyle = alpha(palette.ink, .18); ctx.beginPath(); ctx.roundRect(bx, by, bw, 9, 5); ctx.fill();
    ctx.fillStyle = nitro > 0 ? palette.accent : palette.good; ctx.beginPath(); ctx.roundRect(bx, by, bw * clamp(speed / NITROSPD, 0, 1), 9, 5); ctx.fill();
  }
  function overlay() {
    ctx.fillStyle = "rgba(0,0,0,.66)"; ctx.fillRect(0, 0, width, height);
    text(SPEC.title, width / 2, height * .4, 34, palette.ink, "center");
    text(SPEC.roles.player + " / " + SPEC.roles.objective, width / 2, height * .4 + 40, 15, palette.ink, "center");
    text(state === STATE_OVER ? S.restart : S.start, width / 2, height * .4 + 92, 24, palette.accent, "center");
    if (state === STATE_OVER) text(S.score + " " + score + "  " + S.best + " " + best, width / 2, height * .4 + 128, 15, palette.ink, "center");
  }
  function burst(x, y, c, n) { for (let i = 0; i < n; i++) { const a = Math.random() * Math.PI * 2, s = 40 + Math.random() * 150; particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: .5, size: 3 + Math.random() * 5, color: c }); } }
  function addFloat(t, x, y, c) { floats.push({ text: t, x, y, life: 1, color: c }); }
  function trim(a, pred) { for (let i = a.length - 1; i >= 0; i--) if (pred(a[i])) a.splice(i, 1); }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function rnd(a, b) { return a + Math.random() * (b - a); }
  function alpha(hex, a) { const n = parseInt(hex.slice(1), 16); return `rgba(${n >> 16 & 255},${n >> 8 & 255},${n & 255},${a})`; }
  function lighten(hex, t) { const n = parseInt(hex.slice(1), 16), r = n >> 16 & 255, g = n >> 8 & 255, b = n & 255, m = v => Math.round(v + (255 - v) * t); return `rgb(${m(r)},${m(g)},${m(b)})`; }
  function text(t, x, y, s, c, a) { ctx.fillStyle = c; ctx.font = `900 ${s}px system-ui`; ctx.textAlign = a; ctx.textBaseline = "middle"; ctx.fillText(t, x, y); }
  function tick(now) { if (!last) last = now; const frame = Math.min(.05, (now - last) / 1000); last = now; acc += frame; while (acc >= FIXED_DT) { update(FIXED_DT); acc -= FIXED_DT; } render(); requestAnimationFrame(tick); }
  resize(); requestAnimationFrame(tick);
})();
</script>
</body>
</html>
