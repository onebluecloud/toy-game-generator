<!doctype html>
<html lang="{{LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{{TITLE}}</title>
<link rel="icon" href="data:,">
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:{{BACKGROUND_A}};color:{{INK}};font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;user-select:none}
canvas{display:block;width:100vw;height:100vh;touch-action:none}
</style>
</head>
<body>
<!--
GAME_SPEC_ID: {{ID}}
GAME_KIT: runner-lane
STYLE_KIT: {{STYLE_KIT}}
MECHANICS: {{MECHANICS}}
ENEMY_SET: {{ENEMY_SET}}
-->
<canvas id="game" aria-label="{{TITLE}}"></canvas>
<script>
(() => {
  "use strict";
  const SPEC = {{SPEC_JSON}};
  const S = SPEC.strings;
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const STATE_READY = "READY", STATE_PLAYING = "PLAYING", STATE_OVER = "OVER";
  const GAME_SECONDS = SPEC.duration, FIXED_DT = 1 / 60;
  let width = 0, height = 0, dpr = 1, state = STATE_READY, last = 0, acc = 0;
  let score = 0, best = Number(localStorage.getItem("tgg-" + SPEC.id + "-best") || 0), timeLeft = GAME_SECONDS, spawnTimer = 0, speed = 250, combo = 0, shake = 0, flash = 0;
  const palette = SPEC.palette, lanes = [0, 0, 0], player = { lane: 1, x: 0, y: 0, r: 30, hp: 3 }, objects = [], particles = [], floats = [];

  function resize() { dpr = Math.max(1, Math.min(2, devicePixelRatio || 1)); width = innerWidth; height = innerHeight; canvas.width = Math.floor(width * dpr); canvas.height = Math.floor(height * dpr); canvas.style.width = width + "px"; canvas.style.height = height + "px"; ctx.setTransform(dpr,0,0,dpr,0,0); lanes[0]=width*.25; lanes[1]=width*.5; lanes[2]=width*.75; player.x=lanes[player.lane]; player.y=height*.82; }
  function reset(){ state=STATE_PLAYING; score=0; timeLeft=GAME_SECONDS; spawnTimer=.25; speed=250; combo=0; player.lane=1; player.hp=3; objects.length=particles.length=floats.length=0; }
  function down(e){ e.preventDefault(); if(state===STATE_READY||state===STATE_OVER){ reset(); return; } player.lane = laneFromX(e.clientX); }
  function move(e){ e.preventDefault(); if(state===STATE_PLAYING) player.lane = laneFromX(e.clientX); }
  canvas.addEventListener("pointerdown", down); canvas.addEventListener("pointermove", move); canvas.addEventListener("pointerup", e=>e.preventDefault()); canvas.addEventListener("pointercancel", e=>e.preventDefault()); addEventListener("resize", resize);
  function laneFromX(x){ return Math.max(0, Math.min(2, Math.round((x / width) * 3 - .5))); }
  function spawn(){ const lane=Math.floor(Math.random()*3), roll=Math.random(); objects.push({ lane, y:-50, r: roll < .18 ? 30 : 24, type: roll < .18 ? "nitro" : roll < .58 ? "traffic" : "coin", hit:false }); }
  function update(dt){ if(state!==STATE_PLAYING){ updateFx(dt); return; } timeLeft-=dt; if(timeLeft<=0||player.hp<=0) return over(); speed += dt*8; player.x += (lanes[player.lane]-player.x)*Math.min(1,dt*13); spawnTimer-=dt; if(spawnTimer<=0){ spawn(); spawnTimer=Math.max(.18,.72-(GAME_SECONDS-timeLeft)*.008)/SPEC.tuning.spawnRate; } for(const o of objects){ o.y += speed*dt*(o.type==="nitro"?.85:1); if(!o.hit&&Math.abs(o.y-player.y)<o.r+player.r&&o.lane===player.lane){ o.hit=true; if(o.type==="traffic"){ player.hp--; combo=0; shake=.35; flash=.45; addFloat("-HP",player.x,player.y-50,palette.bad); } else { combo++; const pts=o.type==="nitro"?60:10; score+=Math.round(pts*(1+Math.floor(combo/5))*SPEC.tuning.scoreMultiplier); if(o.type==="nitro") speed+=80; addFloat("+"+pts,player.x,player.y-50,palette.ink); burst(player.x,player.y,o.type==="nitro"?palette.accent:palette.good,18,180); } } } trim(objects,o=>o.hit||o.y>height+80); shake=Math.max(0,shake-dt*3); flash=Math.max(0,flash-dt*3); updateFx(dt); }
  function over(){ state=STATE_OVER; best=Math.max(best,score); localStorage.setItem("tgg-"+SPEC.id+"-best",String(best)); }
  function updateFx(dt){ for(const p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;} for(const f of floats){f.y+=f.vy*dt;f.life-=dt;} trim(particles,p=>p.life<=0); trim(floats,f=>f.life<=0); }
  function render(){ ctx.save(); if(shake>0)ctx.translate((Math.random()-.5)*shake*18,(Math.random()-.5)*shake*18); bg(); road(); objs(); car(); fx(); hud(); if(flash>0){ctx.fillStyle=alpha(palette.bad,flash*.2);ctx.fillRect(0,0,width,height)} if(state!==STATE_PLAYING) overlay(); ctx.restore(); }
  function bg(){ const g=ctx.createLinearGradient(0,0,0,height); g.addColorStop(0,palette.backgroundA);g.addColorStop(1,palette.backgroundB);ctx.fillStyle=g;ctx.fillRect(0,0,width,height); }
  function road(){ for(let i=0;i<3;i++){ctx.fillStyle=i===player.lane?"rgba(255,255,255,.14)":"rgba(255,255,255,.07)";ctx.beginPath();ctx.moveTo(lanes[i]-52,height+30);ctx.lineTo(lanes[i]-18,70);ctx.lineTo(lanes[i]+18,70);ctx.lineTo(lanes[i]+52,height+30);ctx.closePath();ctx.fill();} }
  function objs(){ for(const o of objects){ const x=lanes[o.lane], color=o.type==="traffic"?palette.bad:o.type==="nitro"?palette.accent:palette.good; ctx.fillStyle=color;ctx.beginPath();ctx.roundRect(x-o.r,o.y-o.r,o.r*2,o.r*2,10);ctx.fill();ctx.fillStyle=palette.backgroundA;ctx.font=`900 ${o.r}px system-ui`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(o.type==="traffic"?"!":o.type==="nitro"?"N":"$",x,o.y); } }
  function car(){ ctx.fillStyle=palette.accent;ctx.beginPath();ctx.roundRect(player.x-28,player.y-42,56,84,16);ctx.fill();ctx.strokeStyle=palette.ink;ctx.lineWidth=4;ctx.stroke(); }
  function fx(){ for(const p of particles){ctx.globalAlpha=p.life*2;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size)}ctx.globalAlpha=1;for(const f of floats){ctx.globalAlpha=f.life;ctx.fillStyle=f.color;ctx.font="900 17px system-ui";ctx.textAlign="center";ctx.fillText(f.text,f.x,f.y)}ctx.globalAlpha=1; }
  function hud(){ if(state===STATE_READY)return; text(SPEC.title,18,34,21,palette.ink,"left"); text(`${S.score} ${score} ${S.best} ${best}`,18,64,14,palette.ink,"left"); text(S.time.replace("{n}",Math.ceil(timeLeft)),width-18,34,23,timeLeft<10?palette.bad:palette.ink,"right"); text(`${S.hp} ${player.hp} ${S.combo} ${combo}`,width-18,64,14,palette.ink,"right"); }
  function overlay(){ctx.fillStyle="rgba(0,0,0,.68)";ctx.fillRect(0,0,width,height);text(SPEC.title,width/2,height*.43,36,palette.ink,"center");text(SPEC.roles.player+" / "+SPEC.roles.objective,width/2,height*.43+40,15,palette.ink,"center");text(state===STATE_OVER?S.restart:S.start,width/2,height*.43+92,24,palette.accent,"center");if(state===STATE_OVER)text(`${S.score} ${score} ${S.best} ${best}`,width/2,height*.43+128,15,palette.ink,"center");}
  function burst(x,y,color,count,power){for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=30+Math.random()*power;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.5,size:4+Math.random()*4,color})}}
  function addFloat(text,x,y,color){floats.push({text,x,y,vy:-44,life:.9,color})}
  function text(s,x,y,size,color,align){ctx.fillStyle=color;ctx.font=`900 ${size}px system-ui`;ctx.textAlign=align;ctx.textBaseline="middle";ctx.fillText(s,x,y)}
  function trim(list,pred){for(let i=list.length-1;i>=0;i--)if(pred(list[i]))list.splice(i,1)}
  function alpha(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}
  function tick(now){if(!last)last=now;const frame=Math.min(.05,(now-last)/1000);last=now;acc+=frame;while(acc>=FIXED_DT){update(FIXED_DT);acc-=FIXED_DT}render();requestAnimationFrame(tick)}
  resize();requestAnimationFrame(tick);
})();
</script>
</body>
</html>
